<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tadaa! Admin</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f3f4f6; }
        .sidebar { width: 220px; background: #000; color: #fff; position: fixed; height: 100%; padding: 20px 0; }
        .sidebar h2 { color: #FFD700; padding: 0 20px; font-family: 'Cormorant Garamond', serif; }
        .sidebar a { display: block; padding: 12px 20px; color: #9CA3AF; text-decoration: none; cursor: pointer; }
        .sidebar a:hover, .sidebar a.active { background: #1a1a1a; color: #FFD700; }
        .content { margin-left: 220px; padding: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 16px 24px; border-radius: 12px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 28px; }
        .stat-card p { margin: 4px 0 0; color: #6B7280; font-size: 14px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-primary { background: #FFD700; color: #000; }
        .btn-danger { background: #EF4444; color: #fff; }
        .btn-warning { background: #F59E0B; color: #fff; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; }
        .logout { color: #EF4444 !important; border-top: 1px solid #1a1a1a; margin-top: 20px; padding-top: 12px; }
        img.product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .settings-full { grid-column: span 2; }
        .settings-check { display: flex; align-items: center; gap: 12px; }
        .settings-check label { margin: 0; }
        .settings-check input { width: auto; }
        .action-btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .action-btn.edit { background: #F59E0B; color: #fff; }
        .action-btn.delete { background: #EF4444; color: #fff; }
        .action-btn.edit:hover { background: #D97706; }
        .action-btn.delete:hover { background: #DC2626; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>✨ Tadaa!</h2>
    <a href="#" class="active" onclick="loadPage('dashboard')">📊 Dashboard</a>
    <a href="#" onclick="loadPage('categories')">📂 Categories</a>
    <a href="#" onclick="loadPage('products')">📦 Products</a>
    <a href="#" onclick="loadPage('orders')">📋 Orders</a>
    <a href="#" onclick="loadPage('inventory')">📊 Inventory</a>
    <a href="#" onclick="loadPage('settings')">⚙️ Settings</a>
    <a href="#" class="logout" id="logoutBtn">🚪 Logout</a>
</div>

<div class="content">
    <div class="topbar">
        <h2 id="pageTitle" style="margin:0;">Dashboard</h2>
        <span id="adminEmail" style="color:#6B7280;">admin@tadaa.com</span>
    </div>
    <div id="pageContent">
        <p>Loading...</p>
    </div>
</div>

<script>
    // ============================================
    // FIREBASE SETUP
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyDCXnlAqyt2512HlvBOsSfMZ6O-xg0c94Y",
        authDomain: "tadaa-marketplace.firebaseapp.com",
        projectId: "tadaa-marketplace",
        storageBucket: "tadaa-marketplace.firebasestorage.app",
        messagingSenderId: "56983478470",
        appId: "1:56983478470:web:0efdf7f44b19e88a6237c7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    console.log('🔥 Firebase ready');

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const pageContent = document.getElementById('pageContent');
    const pageTitle = document.getElementById('pageTitle');
    const adminEmail = document.getElementById('adminEmail');

    // ============================================
    // AUTH CHECK
    // ============================================
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = '/tadaa-marketplace/admin.html';
            return;
        }
        adminEmail.textContent = user.email;
        loadPage('dashboard');
    });

    // ============================================
    // LOGOUT
    // ============================================
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        auth.signOut().then(() => {
            window.location.href = '/tadaa-marketplace/admin.html';
        });
    });

    // ============================================
    // PAGE LOADER
    // ============================================
    function loadPage(page) {
        console.log('Loading:', page);
        pageTitle.textContent = page.charAt(0).toUpperCase() + page.slice(1);
        document.querySelectorAll('.sidebar a').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.sidebar a').forEach(l => {
            if (l.textContent.toLowerCase().includes(page)) {
                l.classList.add('active');
            }
        });

        switch(page) {
            case 'dashboard': loadDashboard(); break;
            case 'categories': loadCategories(); break;
            case 'products': loadProducts(); break;
            case 'orders': loadOrders(); break;
            case 'inventory': loadInventory(); break;
            case 'settings': loadSettings(); break;
            default: loadDashboard();
        }
    }

    // ============================================
    // DASHBOARD
    // ============================================
    async function loadDashboard() {
        pageContent.innerHTML = `
            <div class="stats">
                <div class="stat-card"><h3 id="prodCount">...</h3><p>📦 Products</p></div>
                <div class="stat-card"><h3 id="catCount">...</h3><p>📂 Categories</p></div>
                <div class="stat-card"><h3 id="ordCount">...</h3><p>📋 Orders</p></div>
                <div class="stat-card"><h3 id="salesCount">₦0</h3><p>💰 Sales</p></div>
            </div>
            <div class="card">
                <h3>📋 Recent Orders</h3>
                <div id="recentOrders">Loading...</div>
            </div>
        `;

        try {
            const products = await db.collection('products').get();
            const categories = await db.collection('categories').get();
            const orders = await db.collection('orders').get();
            document.getElementById('prodCount').textContent = products.size;
            document.getElementById('catCount').textContent = categories.size;
            document.getElementById('ordCount').textContent = orders.size;

            const recent = await db.collection('orders').orderBy('createdAt', 'desc').limit(5).get();
            const container = document.getElementById('recentOrders');
            if (recent.empty) {
                container.innerHTML = '<p>No orders yet.</p>';
            } else {
                let html = '<table><tr><th>Order</th><th>Customer</th><th>Total</th></tr>';
                recent.forEach(d => {
                    const data = d.data();
                    html += `<tr>
                        <td>${data.orderId || 'N/A'}</td>
                        <td>${data.customer?.fullName || 'Unknown'}</td>
                        <td>₦${data.totals?.grandTotal?.toLocaleString() || 0}</td>
                    </tr>`;
                });
                html += '</table>';
                container.innerHTML = html;
            }
        } catch (e) {
            console.error(e);
        }
    }

    // ============================================
    // CATEGORIES
    // ============================================
    async function loadCategories() {
        pageContent.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h3 style="margin:0;">📂 Categories</h3>
                    <button class="btn btn-primary" onclick="showAddCategory()">+ Add Category</button>
                </div>
                <div id="categoriesList">Loading...</div>
            </div>
        `;

        try {
            const snap = await db.collection('categories').orderBy('order', 'asc').get();
            const container = document.getElementById('categoriesList');
            if (snap.empty) {
                container.innerHTML = '<p>No categories yet.</p>';
                return;
            }
            let html = '<table><tr><th>Name</th><th>Slug</th><th>Actions</th></tr>';
            snap.forEach(doc => {
                const data = doc.data();
                html += `<tr>
                    <td><strong>${data.name}</strong></td>
                    <td>${data.slug || '-'}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editCategory('${doc.id}')">✏️ Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteCategory('${doc.id}')">🗑️ Delete</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (e) {
            console.error(e);
        }
    }

    window.showAddCategory = function() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = `
            <div style="background:#f9fafb; padding:16px; border-radius:8px; margin-top:12px;">
                <h4>Add New Category</h4>
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="catName" placeholder="e.g., Electronics">
                </div>
                <button class="btn btn-primary" onclick="saveCategory()">Save</button>
                <button class="btn" style="background:#e5e7eb;" onclick="loadCategories()">Cancel</button>
            </div>
        `;
    };

    window.saveCategory = async function() {
        const name = document.getElementById('catName').value.trim();
        if (!name) { alert('Name is required!'); return; }
        try {
            await db.collection('categories').add({
                name: name,
                slug: name.toLowerCase().replace(/ /g, '-'),
                order: 0,
                featured: false,
                createdAt: new Date().toISOString()
            });
            alert('✅ Category added!');
            loadCategories();
        } catch (e) {
            alert('Error: ' + e.message);
        }
    };

    window.deleteCategory = async function(id) {
        if (confirm('Delete this category?')) {
            try {
                await db.collection('categories').doc(id).delete();
                alert('✅ Deleted!');
                loadCategories();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
    };

    window.editCategory = async function(id) {
        const newName = prompt('Enter new category name:');
        if (newName && newName.trim()) {
            try {
                await db.collection('categories').doc(id).update({
                    name: newName.trim(),
                    slug: newName.trim().toLowerCase().replace(/ /g, '-')
                });
                alert('✅ Updated!');
                loadCategories();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
    };

    // ============================================
    // PRODUCTS - COMPLETE WITH EDIT & DELETE
    // ============================================
    async function loadProducts() {
        pageContent.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h3 style="margin:0;">📦 Products</h3>
                    <button class="btn btn-primary" onclick="showAddProduct()">+ Add Product</button>
                </div>
                <div id="productsList">Loading...</div>
            </div>
        `;

        try {
            const snap = await db.collection('products').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('productsList');
            if (snap.empty) {
                container.innerHTML = '<p>No products yet. Click "Add Product" to create one.</p>';
                return;
            }
            let html = `<table style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr style="background:#f3f4f6;">
                        <th style="padding:10px; text-align:left;">Image</th>
                        <th style="padding:10px; text-align:left;">Name</th>
                        <th style="padding:10px; text-align:left;">Category</th>
                        <th style="padding:10px; text-align:left;">Price</th>
                        <th style="padding:10px; text-align:left;">Delivery Fee</th>
                        <th style="padding:10px; text-align:left;">Stock</th>
                        <th style="padding:10px; text-align:center;">Actions</th>
                    </tr>
                </thead>
                <tbody>`;
            snap.forEach(doc => {
                const data = doc.data();
                const imageUrl = data.images && data.images.length > 0 ? data.images[0] : '';
                html += `<tr style="border-bottom:1px solid #e5e7eb;">
                    <td style="padding:10px;">${imageUrl ? `<img src="${imageUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:8px;">` : '📷'}</td>
                    <td style="padding:10px;"><strong>${data.name}</strong></td>
                    <td style="padding:10px;">${data.categoryName || 'Uncategorized'}</td>
                    <td style="padding:10px;">₦${data.price?.toLocaleString() || 0}</td>
                    <td style="padding:10px;">₦${data.deliveryFee || 100}</td>
                    <td style="padding:10px;">${data.inStock ? '✅ In Stock' : '❌ Out of Stock'}</td>
                    <td style="padding:10px; text-align:center;">
                        <button onclick="editProduct('${doc.id}')" class="action-btn edit">✏️ Edit</button>
                        <button onclick="deleteProduct('${doc.id}')" class="action-btn delete">🗑️ Delete</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        } catch (e) {
            console.error(e);
            document.getElementById('productsList').innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
        }
    }

    window.showAddProduct = function() {
        loadCategoriesForSelect();
        
        const container = document.getElementById('productsList');
        container.innerHTML = `
            <div style="background:#f9fafb; padding:20px; border-radius:12px; margin-top:12px;">
                <h4>➕ Add New Product</h4>
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="prodName" placeholder="e.g., Rice 20kg">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="prodDesc" placeholder="Brief product description">
                </div>
                <div class="form-group">
                    <label>Price (₦) *</label>
                    <input type="number" id="prodPrice" placeholder="e.g., 2000">
                </div>
                <div class="form-group">
                    <label>Compare Price (Original Price)</label>
                    <input type="number" id="prodCompare" placeholder="e.g., 2500">
                </div>
                <div class="form-group">
                    <label>Delivery Fee per item (₦) *</label>
                    <input type="number" id="prodDeliveryFee" placeholder="e.g., 500" value="100">
                    <small style="color:#6B7280;">This will be multiplied by the quantity when customer orders</small>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="prodCategory" style="width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:8px;">
                        <option value="">Loading categories...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stock Count</label>
                    <input type="number" id="prodStock" placeholder="e.g., 45" value="0">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="prodDiscount" placeholder="e.g., 10" value="0">
                </div>
                <div class="form-group">
                    <label>Image URL (Cloudinary)</label>
                    <input type="text" id="prodImage" placeholder="Paste Cloudinary image URL">
                    <small style="color:#6B7280;">Click the button below to upload an image</small>
                </div>
                <div style="margin:12px 0;">
                    <button class="btn btn-primary" onclick="uploadToCloudinary()">📤 Upload Image to Cloudinary</button>
                </div>
                <button class="btn btn-primary" onclick="saveProduct()">💾 Save Product</button>
                <button class="btn" style="background:#e5e7eb;" onclick="loadProducts()">Cancel</button>
            </div>
        `;
    };

    async function loadCategoriesForSelect() {
        try {
            const snap = await db.collection('categories').orderBy('name', 'asc').get();
            const select = document.getElementById('prodCategory');
            if (!select) return;
            
            let html = '<option value="">Select Category</option>';
            snap.forEach(doc => {
                const data = doc.data();
                html += `<option value="${doc.id}">${data.name}</option>`;
            });
            select.innerHTML = html;
        } catch (e) {
            console.error('Error loading categories:', e);
        }
    }

    window.uploadToCloudinary = function() {
        console.log('📤 Upload button clicked');
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) {
                console.log('❌ No file selected');
                return;
            }
            
            console.log('📁 File selected:', file.name);
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'tadaa_products');
            
            try {
                console.log('📤 Uploading to Cloudinary...');
                const response = await fetch(`https://api.cloudinary.com/v1_1/cva6mpgc/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                console.log('📥 Response status:', response.status);
                const data = await response.json();
                console.log('📥 Response data:', data);
                
                if (data.secure_url) {
                    document.getElementById('prodImage').value = data.secure_url;
                    alert('✅ Image uploaded successfully! URL added to the image field.');
                    console.log('✅ Image URL:', data.secure_url);
                } else {
                    alert('❌ Upload failed: ' + (data.error?.message || 'Unknown error'));
                    console.error('❌ Upload error:', data);
                }
            } catch (error) {
                alert('❌ Upload error: ' + error.message);
                console.error('❌ Upload error:', error);
            }
        };
        input.click();
    };

    window.saveProduct = async function() {
        const name = document.getElementById('prodName').value.trim();
        const description = document.getElementById('prodDesc').value.trim();
        const price = parseFloat(document.getElementById('prodPrice').value);
        const comparePrice = parseFloat(document.getElementById('prodCompare').value) || 0;
        const deliveryFee = parseFloat(document.getElementById('prodDeliveryFee').value) || 100;
        const categoryId = document.getElementById('prodCategory').value;
        const stock = parseInt(document.getElementById('prodStock').value) || 0;
        const discount = parseInt(document.getElementById('prodDiscount').value) || 0;
        const imageUrl = document.getElementById('prodImage').value.trim();

        if (!name) { alert('Product name is required!'); return; }
        if (!price || price <= 0) { alert('Valid price is required!'); return; }
        if (!categoryId) { alert('Please select a category!'); return; }

        let categoryName = '';
        try {
            const catDoc = await db.collection('categories').doc(categoryId).get();
            if (catDoc.exists) {
                categoryName = catDoc.data().name;
            }
        } catch (e) {}

        try {
            await db.collection('products').add({
                name: name,
                slug: name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''),
                description: description,
                price: price,
                comparePrice: comparePrice,
                deliveryFee: deliveryFee,
                categoryId: categoryId,
                categoryName: categoryName,
                images: imageUrl ? [imageUrl] : [],
                inStock: stock > 0,
                stockCount: stock,
                discount: discount,
                isFeatured: false,
                isBestSeller: false,
                createdAt: new Date().toISOString()
            });
            alert('✅ Product added successfully!');
            loadProducts();
        } catch (e) {
            alert('❌ Error: ' + e.message);
        }
    };

    // ============================================
    // EDIT, DELETE, UPDATE PRODUCT FUNCTIONS
    // ============================================
    window.editProduct = async function(id) {
        try {
            const doc = await db.collection('products').doc(id).get();
            if (!doc.exists) { alert('Product not found!'); return; }
            const data = doc.data();
            
            const container = document.getElementById('productsList');
            
            const catSnap = await db.collection('categories').orderBy('name', 'asc').get();
            let catOptions = '<option value="">Select Category</option>';
            catSnap.forEach(d => {
                const selected = d.id === data.categoryId ? 'selected' : '';
                catOptions += `<option value="${d.id}" ${selected}>${d.data().name}</option>`;
            });
            
            container.innerHTML = `
                <div style="background:#f9fafb; padding:20px; border-radius:12px; margin-top:12px;">
                    <h4>✏️ Edit Product</h4>
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="editProdName" value="${data.name || ''}">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="editProdDesc" value="${data.description || ''}">
                    </div>
                    <div class="form-group">
                        <label>Price (₦) *</label>
                        <input type="number" id="editProdPrice" value="${data.price || 0}">
                    </div>
                    <div class="form-group">
                        <label>Compare Price</label>
                        <input type="number" id="editProdCompare" value="${data.comparePrice || 0}">
                    </div>
                    <div class="form-group">
                        <label>Delivery Fee per item (₦)</label>
                        <input type="number" id="editProdDeliveryFee" value="${data.deliveryFee || 100}">
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="editProdCategory" style="width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:8px;">
                            ${catOptions}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Stock Count</label>
                        <input type="number" id="editProdStock" value="${data.stockCount || 0}">
                    </div>
                    <div class="form-group">
                        <label>Discount (%)</label>
                        <input type="number" id="editProdDiscount" value="${data.discount || 0}">
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" id="editProdImage" value="${data.images && data.images.length > 0 ? data.images[0] : ''}">
                    </div>
                    <div style="margin:12px 0;">
                        <button class="btn btn-primary" onclick="uploadToCloudinary()">📤 Upload New Image</button>
                    </div>
                    <button class="btn btn-primary" onclick="updateProduct('${id}')">💾 Update Product</button>
                    <button class="btn" style="background:#e5e7eb;" onclick="loadProducts()">Cancel</button>
                </div>
            `;
        } catch (e) {
            alert('Error loading product: ' + e.message);
        }
    };

    window.deleteProduct = async function(id) {
        if (confirm('Delete this product?')) {
            try {
                await db.collection('products').doc(id).delete();
                alert('✅ Product deleted!');
                loadProducts();
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        }
    };

    window.updateProduct = async function(id) {
        const name = document.getElementById('editProdName').value.trim();
        const description = document.getElementById('editProdDesc').value.trim();
        const price = parseFloat(document.getElementById('editProdPrice').value);
        const comparePrice = parseFloat(document.getElementById('editProdCompare').value) || 0;
        const deliveryFee = parseFloat(document.getElementById('editProdDeliveryFee').value) || 100;
        const categoryId = document.getElementById('editProdCategory').value;
        const stock = parseInt(document.getElementById('editProdStock').value) || 0;
        const discount = parseInt(document.getElementById('editProdDiscount').value) || 0;
        const imageUrl = document.getElementById('editProdImage').value.trim();

        if (!name) { alert('Product name is required!'); return; }
        if (!price || price <= 0) { alert('Valid price is required!'); return; }
        if (!categoryId) { alert('Please select a category!'); return; }

        let categoryName = '';
        try {
            const catDoc = await db.collection('categories').doc(categoryId).get();
            if (catDoc.exists) {
                categoryName = catDoc.data().name;
            }
        } catch (e) {}

        try {
            await db.collection('products').doc(id).update({
                name: name,
                slug: name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''),
                description: description,
                price: price,
                comparePrice: comparePrice,
                deliveryFee: deliveryFee,
                categoryId: categoryId,
                categoryName: categoryName,
                images: imageUrl ? [imageUrl] : [],
                inStock: stock > 0,
                stockCount: stock,
                discount: discount
            });
            alert('✅ Product updated!');
            loadProducts();
        } catch (e) {
            alert('❌ Error: ' + e.message);
        }
    };

    // ============================================
    // ORDERS
    // ============================================
    async function loadOrders() {
        pageContent.innerHTML = `
            <div class="card">
                <h3 style="margin-bottom:20px;">📋 Orders</h3>
                <div id="ordersList">Loading...</div>
            </div>
        `;

        try {
            const snap = await db.collection('orders').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('ordersList');
            if (snap.empty) {
                container.innerHTML = '<p>No orders yet.</p>';
                return;
            }
            let html = `<table>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Payment</th>
                    <th>Status</th>
                </tr>`;
            snap.forEach(doc => {
                const data = doc.data();
                const payStatus = data.payment?.status || 'pending';
                const payColor = payStatus === 'paid' ? '#10B981' : '#F59E0B';
                html += `<tr>
                    <td><strong>${data.orderId || 'N/A'}</strong></td>
                    <td>${data.customer?.fullName || 'Unknown'}</td>
                    <td>₦${data.totals?.grandTotal?.toLocaleString() || 0}</td>
                    <td><span style="background:${payColor}; color:white; padding:2px 12px; border-radius:50px; font-size:12px;">${payStatus}</span></td>
                    <td>${data.status || 'pending'}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch (e) {
            console.error(e);
        }
    }

    function loadInventory() {
        pageContent.innerHTML = `
            <div class="card">
                <h3>📊 Inventory</h3>
                <p>Inventory management coming soon...</p>
            </div>
        `;
    }

    // ============================================
    // SETTINGS
    // ============================================
    function loadSettings() {
        pageContent.innerHTML = `
            <div class="card">
                <h3 style="margin-bottom:20px;">⚙️ Store Settings</h3>
                <div id="settingsForm">Loading settings...</div>
            </div>
        `;
        loadSettingsForm();
    }

    async function loadSettingsForm() {
        const container = document.getElementById('settingsForm');
        container.innerHTML = 'Loading...';
        
        try {
            let settingsDoc = await db.collection('siteSettings').doc('settings').get();
            let settings = settingsDoc.data();
            
            if (!settings) {
                const defaultSettings = {
                    storeName: 'Tadaa! Marketplace',
                    storeLogo: '',
                    storePhone: '+2348012345678',
                    storeEmail: 'support@tadaa.com',
                    storeWhatsApp: '',
                    storeAddress: 'Lagos, Nigeria',
                    currency: '₦',
                    currencyCode: 'NGN',
                    deliveryFee: 100,
                    freeDeliveryThreshold: 5000,
                    freeDeliveryEnabled: false,
                    deliveryLocations: ['Lagos', 'Abuja', 'Port Harcourt'],
                    businessHours: 'Mon-Fri: 9am - 6pm, Sat: 10am - 4pm',
                    announcementBanner: '',
                    maintenanceMode: false,
                    featuredProducts: []
                };
                
                await db.collection('siteSettings').doc('settings').set(defaultSettings);
                settings = defaultSettings;
            }
            
            container.innerHTML = `
                <div class="settings-grid">
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px;">🏪 Store Information</h4></div>
                    
                    <div class="form-group">
                        <label>Store Name</label>
                        <input type="text" id="setStoreName" value="${settings.storeName || ''}">
                    </div>
                    <div class="form-group">
                        <label>Store Logo URL</label>
                        <input type="text" id="setStoreLogo" value="${settings.storeLogo || ''}" placeholder="Cloudinary image URL">
                    </div>
                    
                    <div class="form-group">
                        <label>Store Phone</label>
                        <input type="text" id="setStorePhone" value="${settings.storePhone || ''}">
                    </div>
                    <div class="form-group">
                        <label>Store Email</label>
                        <input type="email" id="setStoreEmail" value="${settings.storeEmail || ''}">
                    </div>
                    
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="text" id="setStoreWhatsApp" value="${settings.storeWhatsApp || ''}">
                    </div>
                    <div class="form-group">
                        <label>Store Address</label>
                        <input type="text" id="setStoreAddress" value="${settings.storeAddress || ''}">
                    </div>
                    
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px; margin-top:20px;">💰 Currency</h4></div>
                    
                    <div class="form-group">
                        <label>Currency Symbol</label>
                        <input type="text" id="setCurrency" value="${settings.currency || '₦'}">
                    </div>
                    <div class="form-group">
                        <label>Currency Code</label>
                        <input type="text" id="setCurrencyCode" value="${settings.currencyCode || 'NGN'}">
                    </div>
                    
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px; margin-top:20px;">🚚 Delivery Settings</h4></div>
                    
                    <div class="form-group">
                        <label>Default Delivery Fee (₦ per item)</label>
                        <input type="number" id="setDeliveryFee" value="${settings.deliveryFee || 100}">
                        <small style="color:#6B7280;">This is the default fee if product doesn't have its own</small>
                    </div>
                    <div class="form-group">
                        <label>Free Delivery Threshold (₦)</label>
                        <input type="number" id="setFreeThreshold" value="${settings.freeDeliveryThreshold || 5000}">
                    </div>
                    
                    <div class="form-group settings-check">
                        <input type="checkbox" id="setFreeDelivery" ${settings.freeDeliveryEnabled ? 'checked' : ''}>
                        <label style="margin:0;">Enable Free Delivery</label>
                    </div>
                    
                    <div class="form-group">
                        <label>Delivery Locations (comma separated)</label>
                        <input type="text" id="setDeliveryLocations" value="${(settings.deliveryLocations || []).join(', ')}">
                    </div>
                    
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px; margin-top:20px;">🕐 Business Hours</h4></div>
                    
                    <div class="form-group settings-full">
                        <label>Business Hours</label>
                        <input type="text" id="setBusinessHours" value="${settings.businessHours || 'Mon-Fri: 9am - 6pm, Sat: 10am - 4pm'}">
                    </div>
                    
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px; margin-top:20px;">📢 Announcement Banner</h4></div>
                    
                    <div class="form-group settings-full">
                        <label>Announcement Text</label>
                        <input type="text" id="setAnnouncement" value="${settings.announcementBanner || ''}" placeholder="e.g., Free delivery this weekend!">
                    </div>
                    
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px; margin-top:20px;">⭐ Featured Products</h4></div>
                    
                    <div class="form-group settings-full">
                        <label>Featured Product IDs (comma separated)</label>
                        <input type="text" id="setFeaturedProducts" value="${(settings.featuredProducts || []).join(', ')}" placeholder="e.g., productId1, productId2">
                        <small style="color:#6B7280;">Copy product IDs from the Products page</small>
                    </div>
                    
                    <div class="settings-full"><h4 style="border-bottom:2px solid #FFD700; padding-bottom:8px; margin-top:20px;">🔧 Maintenance Mode</h4></div>
                    
                    <div class="form-group settings-check">
                        <input type="checkbox" id="setMaintenance" ${settings.maintenanceMode ? 'checked' : ''}>
                        <label style="margin:0;">Enable Maintenance Mode (store will be closed)</label>
                    </div>
                    
                    <div class="settings-full" style="margin-top:20px;">
                        <button class="btn btn-primary" onclick="saveSettings()">💾 Save All Settings</button>
                    </div>
                </div>
            `;
            
        } catch (error) {
            console.error('Error loading settings:', error);
            container.innerHTML = `<p style="color:red;">Error loading settings: ${error.message}</p>`;
        }
    }

    window.saveSettings = async function() {
        try {
            const settings = {
                storeName: document.getElementById('setStoreName').value.trim(),
                storeLogo: document.getElementById('setStoreLogo').value.trim(),
                storePhone: document.getElementById('setStorePhone').value.trim(),
                storeEmail: document.getElementById('setStoreEmail').value.trim(),
                storeWhatsApp: document.getElementById('setStoreWhatsApp').value.trim(),
                storeAddress: document.getElementById('setStoreAddress').value.trim(),
                currency: document.getElementById('setCurrency').value.trim(),
                currencyCode: document.getElementById('setCurrencyCode').value.trim(),
                deliveryFee: parseInt(document.getElementById('setDeliveryFee').value) || 100,
                freeDeliveryThreshold: parseInt(document.getElementById('setFreeThreshold').value) || 0,
                freeDeliveryEnabled: document.getElementById('setFreeDelivery').checked,
                deliveryLocations: document.getElementById('setDeliveryLocations').value.split(',').map(s => s.trim()).filter(s => s),
                businessHours: document.getElementById('setBusinessHours').value.trim(),
                announcementBanner: document.getElementById('setAnnouncement').value.trim(),
                featuredProducts: document.getElementById('setFeaturedProducts').value.split(',').map(s => s.trim()).filter(s => s),
                maintenanceMode: document.getElementById('setMaintenance').checked,
                updatedAt: new Date().toISOString()
            };
            
            await db.collection('siteSettings').doc('settings').update(settings);
            alert('✅ Settings saved successfully!');
            loadSettingsForm();
        } catch (error) {
            alert('❌ Error saving settings: ' + error.message);
            console.error(error);
        }
    };

    console.log('✅ Admin dashboard with delivery fee and working edit/delete!');
</script>

</body>
</html>
