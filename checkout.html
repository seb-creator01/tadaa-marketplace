<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Tadaa!</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cormorant Garamond', serif; background:#f3f4f6; padding:20px; }
        .container { max-width:900px; margin:0 auto; }
        .back-btn { background:none; border:none; color:#FFD700; font-size:18px; cursor:pointer; margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
        .card { background:#fff; border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
        .card h3 { font-size:20px; margin-bottom:16px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-weight:600; margin-bottom:4px; }
        .form-group input, .form-group textarea { width:100%; padding:12px; border:2px solid #E5E7EB; border-radius:10px; font-size:16px; }
        .form-group textarea { min-height:80px; resize:vertical; }
        .btn-primary { width:100%; background:#FFD700; color:#000; border:none; padding:16px; border-radius:12px; font-size:18px; font-weight:700; cursor:pointer; }
        .btn-primary:hover { background:#E6C200; }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .error { background:#FEE2E2; color:#DC2626; padding:12px; border-radius:10px; display:none; margin-bottom:16px; }
        .order-item { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid #F3F4F6; }
        .order-item img { width:50px; height:50px; border-radius:8px; object-fit:cover; background:#f3f4f6; }
        .order-item .info { flex:1; }
        .order-item .price { font-weight:600; }
        .summary-row { display:flex; justify-content:space-between; padding:4px 0; }
        .total-row { display:flex; justify-content:space-between; border-top:2px solid #E5E7EB; padding-top:12px; margin-top:8px; font-size:20px; font-weight:700; }
        .total-row span:last-child { color:#FFD700; }
        .free-badge { background:#D1FAE5; color:#065F46; padding:8px 12px; border-radius:8px; text-align:center; font-weight:600; margin:8px 0; }
        .loading-spinner { display:inline-block; width:20px; height:20px; border:3px solid #f3f4f6; border-top:3px solid #FFD700; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px; vertical-align:middle; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        @media (max-width:768px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div class="container">
    <button class="back-btn" onclick="window.location.href='/tadaa-marketplace/'">← Back to Shopping</button>
    <h1 style="font-size:32px; margin-bottom:8px;">🛒 Checkout</h1>
    <p style="color:#6B7280; margin-bottom:24px;">Enter your details to complete your order</p>
    
    <div class="grid">
        <div>
            <div class="card">
                <h3>📋 Your Details</h3>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullName" placeholder="e.g., John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phoneNumber" placeholder="e.g., 08012345678" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="emailAddress" placeholder="e.g., john@example.com">
                        <small style="color:#6B7280;">We'll send your order confirmation here</small>
                    </div>
                    <div class="form-group">
                        <label>Delivery Address *</label>
                        <textarea id="deliveryAddress" placeholder="e.g., 12, Awolowo Road, Ikoyi, Lagos" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Delivery Instructions</label>
                        <input type="text" id="deliveryInstructions" placeholder="e.g., Call before arrival">
                    </div>
                    <div id="formError" class="error"></div>
                    <button type="submit" class="btn-primary" id="placeOrderBtn">🛒 Place Order</button>
                </form>
            </div>
        </div>
        
        <div>
            <div class="card" style="position:sticky; top:20px;">
                <h3>📦 Order Summary</h3>
                <div id="orderItems" style="max-height:300px; overflow-y:auto; margin-bottom:16px; border-bottom:1px solid #E5E7EB;"></div>
                <div id="orderSummary">
                    <div class="summary-row"><span>Subtotal</span><span id="subtotalDisplay">₦0</span></div>
                    <div class="summary-row"><span>Delivery</span><span id="deliveryDisplay">₦0</span></div>
                    <div id="freeDeliveryBadge" class="free-badge" style="display:none;">🎉 You qualify for FREE delivery!</div>
                    <div class="total-row"><span>Total</span><span id="totalDisplay">₦0</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// FIREBASE SETUP
// ============================================
const firebaseConfig = {
    apiKey: "AIzaSyDCXnlAqyt2512HlvBOsSfMZ6O-xg0c94Y",
    authDomain: "tadaa-marketplace.firebaseapp.com",
    projectId: "tadaa-marketplace",
    storageBucket: "tadaa-marketplace.firebasestorage.app",
    messagingSenderId: "56983478470",
    appId: "1:56983478470:web:0efdf7f44b19e88a6237c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log('🔥 Checkout page loaded');

// ============================================
// STATE
// ============================================
let cart = [];
let settings = {};

// ============================================
// LOAD DATA
// ============================================
async function loadCheckoutData() {
    try {
        const saved = localStorage.getItem('tadaa_cart');
        if (saved) {
            cart = JSON.parse(saved);
        }
        
        if (cart.length === 0) {
            window.location.href = '/tadaa-marketplace/';
            return;
        }
        
        const settingsDoc = await db.collection('siteSettings').doc('settings').get();
        settings = settingsDoc.data() || {};
        
        displayOrderSummary();
        
    } catch (error) {
        console.error('Error loading checkout data:', error);
    }
}

// ============================================
// DISPLAY ORDER SUMMARY
// ============================================
function displayOrderSummary() {
    const deliveryFee = settings.deliveryFee || 500;
    const freeThreshold = settings.freeDeliveryThreshold || 5000;
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const isFreeDelivery = freeThreshold > 0 && subtotal >= freeThreshold;
    const deliveryCharge = isFreeDelivery ? 0 : deliveryFee;
    const total = subtotal + deliveryCharge;
    
    document.getElementById('orderItems').innerHTML = cart.map(item => `
        <div class="order-item">
            ${item.images && item.images.length > 0 ? `<img src="${item.images[0]}" alt="${item.name}">` : '<div style="width:50px;height:50px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:24px;">📷</div>'}
            <div class="info">
                <p style="font-weight:600;">${item.name}</p>
                <p style="font-size:12px;color:#6B7280;">Qty: ${item.quantity} × ₦${item.price.toLocaleString()}</p>
            </div>
            <div class="price">₦${(item.price * item.quantity).toLocaleString()}</div>
        </div>
    `).join('');
    
    document.getElementById('subtotalDisplay').textContent = `₦${subtotal.toLocaleString()}`;
    document.getElementById('deliveryDisplay').textContent = isFreeDelivery ? '🎉 FREE' : `₦${deliveryFee.toLocaleString()}`;
    document.getElementById('totalDisplay').textContent = `₦${total.toLocaleString()}`;
    document.getElementById('freeDeliveryBadge').style.display = isFreeDelivery ? 'block' : 'none';
    document.getElementById('placeOrderBtn').textContent = `🛒 Place Order - ₦${total.toLocaleString()}`;
}

// ============================================
// GENERATE ORDER ID
// ============================================
function generateOrderId() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    let counter = parseInt(localStorage.getItem('tadaa_order_counter') || '0') + 1;
    localStorage.setItem('tadaa_order_counter', counter.toString());
    return `TAD-${year}${month}${day}-${String(counter).padStart(6, '0')}`;
}

// ============================================
// SEND EMAIL
// ============================================
async function sendOrderEmail(orderData, orderId, total) {
    try {
        console.log('📧 Sending email...');
        
        // CORRECT PUBLIC KEY
        emailjs.init('PCqK7ti8VM8XMGk6l');
        
        const emailParams = {
            customer_name: orderData.customer.fullName,
            order_id: orderId,
            subtotal: orderData.totals.subtotal,
            delivery_fee: orderData.totals.deliveryFee,
            total: total,
            delivery_address: orderData.customer.deliveryAddress,
            phone_number: orderData.customer.phoneNumber,
            support_email: 'support@tadaa.com',
            email: orderData.customer.emailAddress || 'tadaamarketplace@gmail.com'
        };
        
        const result = await emailjs.send('service_2n6wyni', 'template_ps9f6di', emailParams);
        console.log('✅ Email sent!', result);
        return true;
    } catch (error) {
        console.error('❌ Email error:', error);
        return false;
    }
}

// ============================================
// PLACE ORDER
// ============================================
document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value.trim();
    const phoneNumber = document.getElementById('phoneNumber').value.trim();
    const emailAddress = document.getElementById('emailAddress').value.trim();
    const deliveryAddress = document.getElementById('deliveryAddress').value.trim();
    const deliveryInstructions = document.getElementById('deliveryInstructions').value.trim();
    
    const errorDiv = document.getElementById('formError');
    if (!fullName) { errorDiv.textContent = '❌ Please enter your full name'; errorDiv.style.display = 'block'; return; }
    if (!phoneNumber) { errorDiv.textContent = '❌ Please enter your phone number'; errorDiv.style.display = 'block'; return; }
    if (!deliveryAddress) { errorDiv.textContent = '❌ Please enter your delivery address'; errorDiv.style.display = 'block'; return; }
    errorDiv.style.display = 'none';
    
    // Disable button and show loading
    const btn = document.getElementById('placeOrderBtn');
    btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
    btn.disabled = true;
    
    const deliveryFee = settings.deliveryFee || 500;
    const freeThreshold = settings.freeDeliveryThreshold || 5000;
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const isFreeDelivery = freeThreshold > 0 && subtotal >= freeThreshold;
    const deliveryCharge = isFreeDelivery ? 0 : deliveryFee;
    const total = subtotal + deliveryCharge;
    const orderId = generateOrderId();
    
    const orderData = {
        orderId: orderId,
        customer: {
            fullName: fullName,
            phoneNumber: phoneNumber,
            emailAddress: emailAddress || '',
            deliveryAddress: deliveryAddress,
            deliveryInstructions: deliveryInstructions || ''
        },
        items: cart.map(item => ({
            productId: item.id,
            name: item.name,
            price: item.price,
            quantity: item.quantity,
            image: item.images && item.images.length > 0 ? item.images[0] : '',
            total: item.price * item.quantity
        })),
        totals: {
            subtotal: subtotal,
            deliveryFee: deliveryCharge,
            discountAmount: 0,
            grandTotal: total
        },
        delivery: {
            fee: deliveryCharge,
            isFree: isFreeDelivery,
            threshold: freeThreshold
        },
        payment: {
            status: 'pending',
            method: 'opay',
            transactionRef: '',
            amountPaid: 0,
            paidAt: null
        },
        status: 'pending',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
    };
    
    try {
        // Save order to Firestore
        const docRef = await db.collection('orders').add(orderData);
        await db.collection('orders').doc(docRef.id).update({ firestoreId: docRef.id });
        console.log('✅ Order saved:', orderId);
        
        // Clear cart immediately
        localStorage.removeItem('tadaa_cart');
        localStorage.removeItem('tadaa_order_counter');
        cart = [];
        
        // Show success page immediately
        document.body.innerHTML = `
            <div style="max-width:600px; margin:40px auto; padding:20px; text-align:center;">
                <div style="background:#D1FAE5; color:#065F46; padding:60px 40px; border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,0.1);">
                    <p style="font-size:64px; margin:0 0 16px;">🎉</p>
                    <h1 style="font-family:'Cormorant Garamond', serif; font-size:32px; color:#065F46; margin:0 0 8px;">Order Placed Successfully!</h1>
                    <p style="color:#065F46; font-size:18px;">A confirmation email is on its way to ${emailAddress || 'your email'}.</p>
                    <div style="background:#fff; border-radius:12px; padding:20px; margin:20px 0;">
                        <p style="color:#6B7280; margin:0; font-size:14px;">Order ID</p>
                        <p style="font-size:28px; font-weight:700; color:#000; margin:4px 0 0;">${orderId}</p>
                    </div>
                    <button onclick="window.location.href='/tadaa-marketplace/'" style="background:#FFD700; color:#000; border:none; padding:12px 24px; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer; margin-top:12px;">🛍️ Continue Shopping</button>
                </div>
            </div>
        `;
        
        // Send email in the background
        sendOrderEmail(orderData, orderId, total);
        
    } catch (error) {
        console.error('Error placing order:', error);
        errorDiv.textContent = '❌ Error placing order: ' + error.message;
        errorDiv.style.display = 'block';
        btn.innerHTML = '🛒 Place Order';
        btn.disabled = false;
    }
});

// ============================================
// INITIALIZE
// ============================================
loadCheckoutData();
</script>

</body>
</html>
