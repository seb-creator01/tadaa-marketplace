<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Checkout - Tadaa!</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; -webkit-text-size-adjust:100%; }
        body { 
            font-family:'Cormorant Garamond', serif; 
            background:#f3f4f6; 
            padding:12px; 
            min-height:100vh; 
            min-height:100dvh;
            overflow-x:hidden;
            width:100%;
        }
        .container { 
            max-width:900px; 
            width:100%;
            margin:0 auto; 
            padding:0 4px; 
            overflow-x:hidden;
        }
        .back-btn { 
            background:none; 
            border:none; 
            color:#FFD700; 
            font-size:18px; 
            cursor:pointer; 
            margin-bottom:16px; 
            padding:8px 0;
            display:inline-block;
        }
        .page-title {
            font-size:28px;
            margin-bottom:4px;
            color:#000;
        }
        .page-subtitle {
            color:#6B7280;
            margin-bottom:16px;
            font-size:16px;
        }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
        .card h3 { font-size:18px; margin-bottom:14px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-weight:600; margin-bottom:4px; font-size:14px; }
        .form-group input, .form-group textarea { 
            width:100%; 
            padding:12px; 
            border:2px solid #E5E7EB; 
            border-radius:10px; 
            font-size:16px; 
            font-family:'Cormorant Garamond', serif;
        }
        .form-group textarea { min-height:80px; resize:vertical; }
        .btn-primary { 
            width:100%; 
            background:#FFD700; 
            color:#000; 
            border:none; 
            padding:14px; 
            border-radius:12px; 
            font-size:17px; 
            font-weight:700; 
            cursor:pointer;
            font-family:'Cormorant Garamond', serif;
        }
        .btn-primary:hover { background:#E6C200; }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .error { background:#FEE2E2; color:#DC2626; padding:12px; border-radius:10px; display:none; margin-bottom:16px; }
        
        /* ===== ORDER ITEMS ROWS ===== */
        .order-item {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #F3F4F6;
            align-items: center;
            width:100%;
        }
        .order-item img {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            object-fit: cover;
            background: #f3f4f6;
            flex-shrink: 0;
        }
        .order-item .info {
            flex: 1;
            min-width: 0;
            overflow:hidden;
        }
        .order-item .info .item-name {
            font-weight: 600;
            font-size: 14px;
            color: #000;
            margin: 0 0 2px;
            word-break:break-word;
        }
        .order-item .info .item-details {
            font-size: 12px;
            color: #6B7280;
            margin: 0;
        }
        .order-item .info .item-price {
            font-size: 13px;
            font-weight: 600;
            color: #000;
            margin: 2px 0 0;
        }
        .order-item .price {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            color: #000;
            text-align: right;
            flex-shrink:0;
        }
        
        .summary-row { display:flex; justify-content:space-between; padding:4px 0; font-size:15px; }
        .total-row { 
            display:flex; 
            justify-content:space-between; 
            border-top:2px solid #E5E7EB; 
            padding-top:12px; 
            margin-top:8px; 
            font-size:20px; 
            font-weight:700; 
        }
        .total-row span:last-child { color:#FFD700; }
        .free-badge { background:#D1FAE5; color:#065F46; padding:8px 12px; border-radius:8px; text-align:center; font-weight:600; margin:8px 0; font-size:14px; }
        .loading-spinner { display:inline-block; width:20px; height:20px; border:3px solid #f3f4f6; border-top:3px solid #FFD700; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px; vertical-align:middle; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        
        /* ===== RESPONSIVE - ALL DEVICES ===== */
        @media (max-width:1024px) {
            .grid { gap:16px; }
        }
        
        @media (max-width:768px) { 
            .grid { 
                grid-template-columns:1fr; 
                gap:16px; 
            }
            body { 
                padding:8px; 
            }
            .card { 
                padding:16px !important; 
            }
            .page-title { 
                font-size:24px !important; 
            }
            .order-item { 
                gap:12px; 
                padding:12px 0; 
            }
            .order-item img { 
                width:48px; 
                height:48px; 
            }
            .order-item .info .item-name { 
                font-size:13px; 
            }
            .order-item .price { 
                font-size:13px; 
            }
            .container {
                padding:0 2px;
            }
            .back-btn {
                font-size:16px;
                margin-bottom:12px;
            }
            .btn-primary {
                font-size:16px;
                padding:14px;
            }
            .total-row {
                font-size:18px;
            }
            #orderItems {
                max-height:250px !important;
            }
        }
        
        @media (max-width:480px) {
            body { padding:6px; }
            .card { padding:14px !important; border-radius:12px; }
            .order-item { gap:10px; padding:10px 0; }
            .order-item img { width:42px; height:42px; }
            .order-item .info .item-name { font-size:12px; }
            .order-item .info .item-details { font-size:11px; }
            .order-item .price { font-size:12px; }
            .summary-row { font-size:14px; }
            .total-row { font-size:17px; }
            .page-title { font-size:20px !important; }
            .form-group input, .form-group textarea { padding:10px; font-size:15px; }
            .btn-primary { font-size:15px; padding:12px; }
            .container { padding:0; }
        }
        
        /* ===== IPHONE SAFARI FIXES ===== */
        @supports (-webkit-touch-callout: none) {
            body {
                padding: 10px !important;
                overflow-x: hidden !important;
                width: 100% !important;
            }
            .container {
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 4px !important;
                overflow-x: hidden !important;
            }
            .card {
                padding: 14px !important;
                border-radius: 14px !important;
            }
            .order-item {
                gap: 10px !important;
                padding: 10px 0 !important;
            }
            .order-item img {
                width: 45px !important;
                height: 45px !important;
                flex-shrink: 0 !important;
            }
            .order-item .info .item-name {
                font-size: 13px !important;
                word-break: break-word !important;
            }
            .order-item .price {
                font-size: 12px !important;
                flex-shrink: 0 !important;
            }
            .grid {
                gap: 14px !important;
            }
            h1 {
                font-size: 22px !important;
            }
            .summary-row {
                font-size: 14px !important;
            }
            .total-row {
                font-size: 17px !important;
            }
            .btn-primary {
                font-size: 15px !important;
                padding: 14px !important;
            }
            .order-item .info {
                overflow: hidden !important;
            }
        }
        
        /* ===== IPHONE NOTCH SAFE AREA ===== */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }
        
        input, textarea, select {
            font-size: 16px !important;
            max-width: 100%;
        }
        
        #orderItems {
            max-height:300px;
            overflow-y:auto;
            margin-bottom:16px;
            border-bottom:1px solid #E5E7EB;
            padding-right:4px;
        }
        #orderItems::-webkit-scrollbar {
            width:4px;
        }
        #orderItems::-webkit-scrollbar-track {
            background:#f1f1f1;
            border-radius:10px;
        }
        #orderItems::-webkit-scrollbar-thumb {
            background:#FFD700;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="container" id="checkoutContainer">
    <button class="back-btn" onclick="window.location.href='/tadaa-marketplace/'">← Back to Shopping</button>
    <h1 class="page-title">🛒 Checkout</h1>
    <p class="page-subtitle">Enter your details to complete your order</p>
    
    <div class="grid">
        <div>
            <div class="card">
                <h3>📋 Your Details</h3>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullName" placeholder="e.g., John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phoneNumber" placeholder="e.g., 08012345678" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address <span style="color:#9CA3AF; font-weight:400;">(Optional)</span></label>
                        <input type="email" id="emailAddress" placeholder="e.g., john@example.com">
                        <small style="color:#6B7280; font-size:12px;">We'll send your order confirmation here</small>
                    </div>
                    <div class="form-group">
                        <label>Delivery Address *</label>
                        <textarea id="deliveryAddress" placeholder="e.g., 12, Awolowo Road, Ikoyi, Lagos" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Delivery Instructions <span style="color:#9CA3AF; font-weight:400;">(Optional)</span></label>
                        <input type="text" id="deliveryInstructions" placeholder="e.g., Call before arrival">
                    </div>
                    <div id="formError" class="error"></div>
                    <button type="submit" class="btn-primary" id="placeOrderBtn">🛒 Place Order</button>
                </form>
            </div>
        </div>
        
        <div>
            <div class="card" style="position:sticky; top:20px;">
                <h3>📦 Order Summary</h3>
                <div id="orderItems"></div>
                <div id="orderSummary">
                    <div class="summary-row"><span>Subtotal</span><span id="subtotalDisplay">₦0</span></div>
                    <div class="summary-row"><span>Delivery</span><span id="deliveryDisplay">₦0</span></div>
                    <div id="freeDeliveryBadge" style="display:none; margin:8px 0;"></div>
                    <div class="total-row"><span>Total</span><span id="totalDisplay">₦0</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDCXnlAqyt2512HlvBOsSfMZ6O-xg0c94Y",
    authDomain: "tadaa-marketplace.firebaseapp.com",
    projectId: "tadaa-marketplace",
    storageBucket: "tadaa-marketplace.firebasestorage.app",
    messagingSenderId: "56983478470",
    appId: "1:56983478470:web:0efdf7f44b19e88a6237c7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];
let settings = {};
let orderData = null;
let orderId = null;

async function loadCheckoutData() {
    try {
        const saved = localStorage.getItem('tadaa_cart');
        if (saved) { cart = JSON.parse(saved); }
        if (cart.length === 0) { window.location.href = '/tadaa-marketplace/'; return; }
        const settingsDoc = await db.collection('siteSettings').doc('settings').get();
        settings = settingsDoc.data() || {};
        displayOrderSummary();
    } catch (error) {
        console.error('Error loading checkout data:', error);
    }
}

function displayOrderSummary() {
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    const perItemDelivery = settings.deliveryFee || 100;
    const deliveryFee = perItemDelivery * totalItems;
    const freeThreshold = settings.freeDeliveryThreshold || 5000;
    const freeDeliveryEnabled = settings.freeDeliveryEnabled || false;
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const isFreeDelivery = freeDeliveryEnabled && freeThreshold > 0 && subtotal >= freeThreshold;
    const deliveryCharge = isFreeDelivery ? 0 : deliveryFee;
    const total = subtotal + deliveryCharge;
    
    document.getElementById('orderItems').innerHTML = cart.map(item => {
        const itemTotal = item.price * item.quantity;
        return `
        <div class="order-item">
            ${item.images && item.images.length > 0 ? `<img src="${item.images[0]}" alt="${item.name}">` : '<div style="width:55px;height:55px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">📷</div>'}
            <div class="info">
                <p class="item-name">${item.name}</p>
                <p class="item-details">Qty: ${item.quantity} × ₦${item.price.toLocaleString()}</p>
                <p class="item-price">₦${itemTotal.toLocaleString()}</p>
            </div>
            <div class="price">₦${itemTotal.toLocaleString()}</div>
        </div>
    `}).join('');
    
    document.getElementById('subtotalDisplay').textContent = `₦${subtotal.toLocaleString()}`;
    document.getElementById('deliveryDisplay').textContent = isFreeDelivery ? '🎉 FREE' : `₦${deliveryCharge.toLocaleString()} (${totalItems} items × ₦${perItemDelivery})`;
    document.getElementById('totalDisplay').textContent = `₦${total.toLocaleString()}`;
    
    const badge = document.getElementById('freeDeliveryBadge');
    if (freeDeliveryEnabled) {
        if (isFreeDelivery) {
            badge.innerHTML = '🎉 You qualify for FREE delivery!';
            badge.style.display = 'block';
            badge.style.background = '#D1FAE5';
            badge.style.color = '#065F46';
            badge.style.padding = '8px 12px';
            badge.style.borderRadius = '8px';
            badge.style.textAlign = 'center';
            badge.style.fontWeight = '600';
        } else if (subtotal < freeThreshold) {
            const remaining = freeThreshold - subtotal;
            badge.innerHTML = `Add ₦${remaining.toLocaleString()} more for FREE delivery`;
            badge.style.display = 'block';
            badge.style.background = '#FEF3C7';
            badge.style.color = '#92400E';
            badge.style.padding = '8px 12px';
            badge.style.borderRadius = '8px';
            badge.style.textAlign = 'center';
            badge.style.fontSize = '13px';
        } else {
            badge.style.display = 'none';
        }
    } else {
        badge.style.display = 'none';
    }
    
    document.getElementById('placeOrderBtn').textContent = `🛒 Place Order - ₦${total.toLocaleString()}`;
}

function generateOrderId() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const timestamp = Date.now().toString().slice(-6);
    const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
    return `TAD-${year}${month}${day}-${timestamp}${random}`;
}

async function sendOrderEmail(orderData, orderId, total) {
    try {
        console.log('📧 Sending email...');
        emailjs.init('PCqK7ti8VM8XMGk6l');
        let itemsHtml = '';
        orderData.items.forEach(item => {
            itemsHtml += `
                <tr>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #F3F4F6;">${item.name}</td>
                    <td style="padding: 10px 12px; text-align: center; border-bottom: 1px solid #F3F4F6;">${item.quantity}</td>
                    <td style="padding: 10px 12px; text-align: right; border-bottom: 1px solid #F3F4F6;">₦${item.price}</td>
                </tr>
            `;
        });
        const emailParams = {
            customer_name: orderData.customer.fullName,
            order_id: orderId,
            items_html: itemsHtml,
            subtotal: orderData.totals.subtotal,
            delivery_fee: orderData.totals.deliveryFee,
            total: total,
            delivery_address: orderData.customer.deliveryAddress,
            phone_number: orderData.customer.phoneNumber,
            email: orderData.customer.emailAddress || 'tadaamarketplace@gmail.com'
        };
        const result = await emailjs.send('service_2n6wyni', 'template_ps9f6di', emailParams);
        console.log('✅ Email sent!', result);
        return true;
    } catch (error) {
        console.error('❌ Email error:', error);
        return false;
    }
}

function showPaymentCancelled(orderId) {
    document.body.innerHTML = `
        <div style="max-width:600px; margin:40px auto; padding:20px; text-align:center;">
            <div style="background:#FEE2E2; color:#991B1B; padding:60px 40px; border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,0.1);">
                <p style="font-size:64px; margin:0 0 16px;">❌</p>
                <h1 style="font-family:'Cormorant Garamond', serif; font-size:32px; color:#991B1B; margin:0 0 8px;">Payment Cancelled</h1>
                <p style="color:#991B1B; font-size:18px;">Your payment was not completed.</p>
                <div style="background:#fff; border-radius:12px; padding:20px; margin:20px 0;">
                    <p style="margin:4px 0;"><strong>Order ID:</strong> ${orderId}</p>
                    <p style="margin:4px 0;"><strong>Status:</strong> Pending payment</p>
                </div>
                <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px;">
                    <button onclick="window.location.href='/tadaa-marketplace/checkout.html'" style="background:#FFD700; color:#000; border:none; padding:12px 24px; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer;">🔄 Try Again</button>
                    <button onclick="window.location.href='/tadaa-marketplace/'" style="background:#1A56DB; color:#fff; border:none; padding:12px 24px; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer;">🏠 Go Home</button>
                </div>
            </div>
        </div>
    `;
}

document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value.trim();
    const phoneNumber = document.getElementById('phoneNumber').value.trim();
    const emailAddress = document.getElementById('emailAddress').value.trim();
    const deliveryAddress = document.getElementById('deliveryAddress').value.trim();
    const deliveryInstructions = document.getElementById('deliveryInstructions').value.trim();
    
    const errorDiv = document.getElementById('formError');
    if (!fullName) { errorDiv.textContent = '❌ Please enter your full name'; errorDiv.style.display = 'block'; return; }
    if (!phoneNumber) { errorDiv.textContent = '❌ Please enter your phone number'; errorDiv.style.display = 'block'; return; }
    if (!deliveryAddress) { errorDiv.textContent = '❌ Please enter your delivery address'; errorDiv.style.display = 'block'; return; }
    errorDiv.style.display = 'none';
    
    const btn = document.getElementById('placeOrderBtn');
    btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
    btn.disabled = true;
    
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    const perItemDelivery = settings.deliveryFee || 100;
    const freeThreshold = settings.freeDeliveryThreshold || 5000;
    const freeDeliveryEnabled = settings.freeDeliveryEnabled || false;
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const isFreeDelivery = freeDeliveryEnabled && freeThreshold > 0 && subtotal >= freeThreshold;
    const deliveryCharge = isFreeDelivery ? 0 : (perItemDelivery * totalItems);
    const total = subtotal + deliveryCharge;
    const orderId = generateOrderId();
    
    orderData = {
        orderId: orderId,
        customer: {
            fullName: fullName,
            phoneNumber: phoneNumber,
            emailAddress: emailAddress || '',
            deliveryAddress: deliveryAddress,
            deliveryInstructions: deliveryInstructions || ''
        },
        items: cart.map(item => ({
            productId: item.id,
            name: item.name,
            price: item.price,
            quantity: item.quantity,
            image: item.images && item.images.length > 0 ? item.images[0] : '',
            total: item.price * item.quantity
        })),
        totals: {
            subtotal: subtotal,
            deliveryFee: deliveryCharge,
            discountAmount: 0,
            grandTotal: total
        },
        delivery: {
            fee: deliveryCharge,
            isFree: isFreeDelivery,
            threshold: freeThreshold,
            perItem: perItemDelivery,
            totalItems: totalItems
        },
        payment: {
            status: 'pending',
            method: 'paystack',
            transactionRef: '',
            amountPaid: 0,
            paidAt: null
        },
        status: 'pending',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
    };
    
    try {
        const docRef = await db.collection('orders').add(orderData);
        await db.collection('orders').doc(docRef.id).update({ firestoreId: docRef.id });
        console.log('✅ Order saved:', orderId);
        
        localStorage.removeItem('tadaa_cart');
        cart = [];
        
        sendOrderEmail(orderData, orderId, total);
        
        const email = orderData.customer.emailAddress || 'tadaamarketplace@gmail.com';
        const amount = Math.round(total * 100);
        const uniqueRef = orderId + '-' + Date.now();

        const handler = PaystackPop.setup({
            key: 'pk_live_d3d75897f95466e18cf2aceef5657fe392674331',
            email: email,
            amount: amount,
            currency: 'NGN',
            ref: uniqueRef,
            metadata: {
                custom_fields: [
                    { display_name: "Order ID", variable_name: "order_id", value: orderId },
                    { display_name: "Customer Name", variable_name: "customer_name", value: orderData.customer.fullName }
                ]
            },
            callback: function(response) {
                console.log('✅ Payment success:', response);
                window.location.href = `/tadaa-marketplace/payment-success.html?order=${orderId}&reference=${response.reference}&amount=${total}`;
            },
            onClose: function() {
                console.log('❌ Payment window closed');
                showPaymentCancelled(orderId);
            }
        });
        
        handler.openIframe();
        
    } catch (error) {
        console.error('Error placing order:', error);
        errorDiv.textContent = '❌ Error placing order: ' + error.message;
        errorDiv.style.display = 'block';
        btn.innerHTML = '🛒 Place Order';
        btn.disabled = false;
    }
});

loadCheckoutData();
</script>

</body>
</html>
