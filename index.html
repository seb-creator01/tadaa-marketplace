<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <meta name="keywords" content="marketplace, online shopping, Nigeria, Tadaa, buy online" />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/tadaa-marketplace/manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon -->
    <link rel="icon" href="/tadaa-marketplace/favicon.ico" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="/tadaa-marketplace/assets/css/main.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        /* Loading animation for content */
        #app { opacity: 0; transition: opacity 0.5s ease; }
        #app.loaded { opacity: 1; }
        
        /* Install banner - hidden by default, shows after content loads */
        #installBanner { display: none !important; }
        #installBanner.show { display: flex !important; }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Install App Banner - Hidden until content loads -->
        <div id="installBanner" style="background:#FFD700; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:99;">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">📲</span>
                <div>
                    <span style="font-weight:700; font-size:16px; color:#000;">Install Tadaa! App</span>
                    <span style="font-size:13px; color:#333; display:block;">Get the best shopping experience</span>
                </div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button id="installBtn" style="background:#000; color:#FFD700; border:none; padding:10px 20px; border-radius:50px; font-weight:700; cursor:pointer; font-size:14px;">📲 Install</button>
                <button id="cancelInstallBtn" style="background:transparent; color:#000; border:2px solid #000; padding:10px 20px; border-radius:50px; cursor:pointer; font-size:14px;">Not Now</button>
            </div>
        </div>
        
        <!-- Header will be injected here -->
        <header id="main-header"></header>
        
        <!-- Hero Section -->
        <section id="hero-section"></section>
        
        <!-- Announcement Section -->
        <section id="announcement-section"></section>
        
        <!-- Categories Section -->
        <section id="categories-section" style="padding: 30px 0;"></section>
        
        <!-- Products Section -->
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        
        <!-- Footer will be injected here -->
        <footer id="main-footer"></footer>
    </div>
    
    <!-- Customer App -->
    <script src="/tadaa-marketplace/assets/js/customer/app.js"></script>
    
    <!-- ============================================
         PWA INSTALL & SERVICE WORKER (LOADED LAST)
         ============================================ -->
    <script>
        // ============================================
        // SHOW CONTENT FIRST, THEN INSTALL BANNER
        // ============================================
        
        // Mark app as loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Show content with animation
            const app = document.getElementById('app');
            setTimeout(function() {
                app.classList.add('loaded');
            }, 100);
            
            // Initialize PWA features after content loads
            setTimeout(function() {
                initPWA();
            }, 1500);
        });
        
        // ============================================
        // PWA INSTALL PROMPT (DELAYED)
        // ============================================
        let deferredPrompt;
        let installBannerShown = false;
        
        function initPWA() {
            console.log('📱 Initializing PWA features...');
            
            const installBanner = document.getElementById('installBanner');
            const installBtn = document.getElementById('installBtn');
            const cancelBtn = document.getElementById('cancelInstallBtn');
            
            // Check if already installed
            function isAppInstalled() {
                if (window.matchMedia('(display-mode: standalone)').matches) return true;
                if (window.navigator.standalone) return true;
                return false;
            }
            
            function showInstallBanner() {
                if (!installBannerShown && !isAppInstalled() && deferredPrompt) {
                    installBanner.classList.add('show');
                    installBannerShown = true;
                }
            }
            
            function hideInstallBanner() {
                installBanner.classList.remove('show');
            }
            
            // Install event listener
            window.addEventListener('beforeinstallprompt', function(e) {
                console.log('📲 Install prompt available');
                e.preventDefault();
                deferredPrompt = e;
                
                // Show banner after a short delay (content already visible)
                setTimeout(showInstallBanner, 500);
            });
            
            // Install button
            if (installBtn) {
                installBtn.addEventListener('click', async function() {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const result = await deferredPrompt.userChoice;
                        if (result.outcome === 'accepted') {
                            console.log('✅ App installed!');
                            hideInstallBanner();
                        } else {
                            hideInstallBanner();
                            sessionStorage.setItem('installDeclined', 'true');
                        }
                        deferredPrompt = null;
                    } else {
                        alert('📲 Tap the three dots (⋮) and select "Install app"');
                    }
                });
            }
            
            // Cancel button
            if (cancelBtn) {
                cancelBtn.addEventListener('click', function() {
                    console.log('❌ User cancelled install');
                    hideInstallBanner();
                    sessionStorage.setItem('installDeclined', 'true');
                });
            }
            
            // App installed event
            window.addEventListener('appinstalled', function() {
                console.log('✅ Tadaa! app installed!');
                hideInstallBanner();
                showToast('🎉 Thank you for installing Tadaa!');
            });
            
            // Check if should show banner
            function checkBanner() {
                if (isAppInstalled()) {
                    hideInstallBanner();
                    return;
                }
                if (sessionStorage.getItem('installDeclined') === 'true') {
                    hideInstallBanner();
                    return;
                }
                if (deferredPrompt) {
                    showInstallBanner();
                }
            }
            
            // Check on visibility change (user comes back to page)
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    setTimeout(checkBanner, 500);
                }
            });
            
            // Check after 3 seconds
            setTimeout(checkBanner, 3000);
        }
        
        // ============================================
        // TOAST NOTIFICATION
        // ============================================
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
                background: #000; color: #fff; padding: 16px 24px;
                border-radius: 12px; z-index: 9999;
                font-family: 'Cormorant Garamond', serif;
                font-size: 16px; text-align: center;
                animation: slideInUp 0.5s ease;
                max-width: 90%;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
        
        // ============================================
        // SERVICE WORKER (REGISTER LAST)
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                // Register service worker after everything loads
                setTimeout(function() {
                    navigator.serviceWorker.register('/tadaa-marketplace/sw.js')
                        .then(function(registration) {
                            console.log('✅ Service Worker registered');
                            registration.addEventListener('updatefound', function() {
                                const newWorker = registration.installing;
                                newWorker.addEventListener('statechange', function() {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        console.log('🔄 Update available!');
                                        showUpdateNotification();
                                    }
                                });
                            });
                        })
                        .catch(function(error) {
                            console.log('❌ Service Worker registration failed:', error);
                        });
                }, 2000);
            });
        }
        
        // ============================================
        // UPDATE NOTIFICATION
        // ============================================
        function showUpdateNotification() {
            if (document.querySelector('.update-notification')) return;
            const updateDiv = document.createElement('div');
            updateDiv.className = 'update-notification';
            updateDiv.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: #FFD700; color: #000; padding: 16px 24px;
                border-radius: 12px; font-weight: 600; z-index: 9999;
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
                display: flex; align-items: center; gap: 16px;
                font-family: 'Cormorant Garamond', serif;
                max-width: 90%;
                animation: slideInUp 0.5s ease;
            `;
            updateDiv.innerHTML = `
                🔄 New version available!
                <button onclick="location.reload()" style="background:#000; color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; font-family:'Cormorant Garamond', serif;">Update Now</button>
                <button onclick="this.parentElement.remove()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#000;">✕</button>
            `;
            document.body.appendChild(updateDiv);
            setTimeout(() => {
                if (updateDiv.parentNode) {
                    updateDiv.style.opacity = '0';
                    updateDiv.style.transition = 'opacity 0.5s';
                    setTimeout(() => updateDiv.remove(), 500);
                }
            }, 30000);
        }
        
        console.log('✅ Tadaa! PWA loaded - content first, install second!');
    </script>
</body>
</html>
