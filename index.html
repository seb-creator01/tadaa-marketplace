<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    
    <link rel="manifest" href="/tadaa-marketplace/manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="icon" href="/tadaa-marketplace/favicon.ico" />
    <link rel="stylesheet" href="/tadaa-marketplace/assets/css/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        #installBanner { display: none; background: #FFD700; padding: 12px 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 99; }
        #installBanner.show { display: flex !important; }
        #installBanner button { border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Cormorant Garamond', serif; }
        .btn-install { background: #000; color: #FFD700; }
        .btn-install:hover { background: #1a1a1a; }
        .btn-cancel { background: transparent; color: #000; border: 2px solid #000 !important; }
        .btn-cancel:hover { background: #000; color: #fff; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        #installBanner.show { animation: slideDown 0.5s ease; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Install Banner -->
        <div id="installBanner">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">📲</span>
                <div>
                    <span style="font-weight:700; font-size:16px; color:#000;">Install Tadaa! App</span>
                    <span style="font-size:12px; color:#333; display:block;" id="installSubtext">Get the full app experience</span>
                </div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-install" id="installBtn">📲 Install</button>
                <button class="btn-cancel" id="cancelInstallBtn">Not Now</button>
            </div>
        </div>
        
        <header id="main-header"></header>
        <section id="hero-section"></section>
        <section id="announcement-section"></section>
        <section id="categories-section" style="padding: 30px 0;"></section>
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        <footer id="main-footer"></footer>
    </div>
    
    <script src="/tadaa-marketplace/assets/js/customer/app.js"></script>
    
    <script>
        console.log('🚀 Tadaa! PWA loaded');
        
        let deferredPrompt = null;
        let installBannerShown = false;
        
        const banner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const cancelBtn = document.getElementById('cancelInstallBtn');
        const installSubtext = document.getElementById('installSubtext');
        
        // ============================================
        // DETECT BROWSER
        // ============================================
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            const isSamsung = ua.includes('Samsung') || ua.includes('SM-');
            const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
            const isChrome = /chrome/i.test(ua) && !ua.includes('Samsung');
            const isIOS = /iphone|ipad|ipod/i.test(ua);
            const isAndroid = /android/i.test(ua);
            
            return { isSamsung, isSafari, isChrome, isIOS, isAndroid };
        }
        
        // ============================================
        // CHECK IF APP IS INSTALLED
        // ============================================
        function isAppInstalled() {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                console.log('✅ App is already installed (standalone mode)');
                return true;
            }
            if (window.navigator.standalone) {
                console.log('✅ App is already installed (iOS)');
                return true;
            }
            return false;
        }
        
        // ============================================
        // SHOW / HIDE BANNER
        // ============================================
        function showBanner() {
            if (!banner) return;
            if (isAppInstalled()) { banner.classList.remove('show'); return; }
            if (sessionStorage.getItem('installDeclined') === 'true') { banner.classList.remove('show'); return; }
            
            const browser = getBrowserInfo();
            
            // For Chrome Android - use deferredPrompt
            if (browser.isChrome && browser.isAndroid) {
                if (!deferredPrompt) {
                    console.log('⏳ No deferredPrompt, banner hidden');
                    banner.classList.remove('show');
                    return;
                }
            }
            
            console.log('📲 Showing install banner');
            banner.classList.add('show');
            installBannerShown = true;
        }
        
        function hideBanner() {
            if (banner) banner.classList.remove('show');
        }
        
        // ============================================
        // SHOW INSTALL INSTRUCTIONS
        // ============================================
        function showInstallInstructions() {
            const browser = getBrowserInfo();
            
            const instructions = document.createElement('div');
            instructions.id = 'installInstructions';
            instructions.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.8); z-index: 10000;
                display: flex; align-items: center; justify-content: center;
                padding: 20px;
            `;
            instructions.innerHTML = `
                <div style="background: #fff; border-radius: 24px; max-width: 400px; width: 100%; padding: 32px; text-align: center; position: relative;">
                    <button onclick="this.closest('#installInstructions').remove()" style="position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">✕</button>
                    <div style="font-size: 48px; margin-bottom: 16px;">📱</div>
                    <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #000; margin: 0 0 8px;">Install Tadaa!</h2>
                    <p style="color: #666; margin-bottom: 20px; line-height: 1.5;">Get the full app experience on your device</p>
                    <div style="text-align: left; background: #f5f5f5; padding: 16px; border-radius: 12px; margin-bottom: 20px;">
                        <p style="font-weight: 600; margin: 0 0 8px; color: #000;">${browser.isSafari || browser.isIOS ? '📲 On iPhone/iPad:' : '📲 On Samsung Internet:'}</p>
                        <ol style="margin: 0; padding-left: 20px; color: #333; line-height: 2;">
                            ${browser.isSafari || browser.isIOS ? `
                                <li>Tap the <strong>Share</strong> icon <span style="font-size:18px;">⬆️</span></li>
                                <li>Scroll down and tap <strong>"Add to Home Screen"</strong></li>
                                <li>Tap <strong>"Add"</strong> in the top right</li>
                            ` : `
                                <li>Tap the <strong>☰</strong> menu icon</li>
                                <li>Select <strong>"Add to Home Screen"</strong></li>
                                <li>Tap <strong>"Add"</strong> to install</li>
                            `}
                        </ol>
                    </div>
                    <button onclick="this.closest('#installInstructions').remove()" style="background: #FFD700; color: #000; border: none; padding: 12px 32px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer;">Got it!</button>
                </div>
            `;
            document.body.appendChild(instructions);
        }
        
        // ============================================
        // CHECK AND SHOW CORRECT BANNER
        // ============================================
        function checkAndShowInstallBanner() {
            const browser = getBrowserInfo();
            
            // If already installed, hide banner
            if (isAppInstalled()) {
                banner.classList.remove('show');
                return;
            }
            
            // For Chrome Android - use beforeinstallprompt
            if (browser.isChrome && browser.isAndroid) {
                if (deferredPrompt) {
                    banner.classList.add('show');
                    if (installBtn) installBtn.textContent = '📲 Install';
                    if (installSubtext) installSubtext.textContent = 'Get the full app experience';
                }
                return;
            }
            
            // For Samsung Internet and iPhone - show instructions
            if (browser.isSamsung || browser.isSafari || browser.isIOS) {
                banner.classList.add('show');
                if (installBtn) installBtn.textContent = '📱 Install App';
                if (installSubtext) installSubtext.textContent = 'Add to your home screen';
                return;
            }
        }
        
        // ============================================
        // INSTALL BUTTON
        // ============================================
        if (installBtn) {
            installBtn.addEventListener('click', function() {
                console.log('📲 Install button clicked');
                
                const browser = getBrowserInfo();
                
                if (isAppInstalled()) {
                    console.log('⏭️ Already installed');
                    hideBanner();
                    return;
                }
                
                // For Chrome Android - use native prompt
                if (browser.isChrome && browser.isAndroid) {
                    if (deferredPrompt) {
                        console.log('📲 Showing native install prompt');
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then(function(result) {
                            if (result.outcome === 'accepted') {
                                console.log('✅ App installed successfully!');
                                hideBanner();
                                sessionStorage.removeItem('installDeclined');
                            } else {
                                console.log('❌ User declined');
                                hideBanner();
                                sessionStorage.setItem('installDeclined', 'true');
                            }
                            deferredPrompt = null;
                        });
                    } else {
                        console.log('❌ No deferredPrompt available');
                        hideBanner();
                        sessionStorage.setItem('installDeclined', 'true');
                    }
                } else {
                    // For Samsung/iPhone - show instructions
                    showInstallInstructions();
                }
            });
        }
        
        // ============================================
        // CANCEL BUTTON
        // ============================================
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                console.log('❌ User cancelled');
                hideBanner();
                sessionStorage.setItem('installDeclined', 'true');
            });
        }
        
        // ============================================
        // CAPTURE INSTALL PROMPT - THIS IS KEY
        // ============================================
        window.addEventListener('beforeinstallprompt', function(e) {
            console.log('📲 beforeinstallprompt event FIRED!');
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ deferredPrompt saved');
            checkAndShowInstallBanner();
        });
        
        // ============================================
        // APP INSTALLED
        // ============================================
        window.addEventListener('appinstalled', function() {
            console.log('✅ App installed successfully!');
            hideBanner();
        });
        
        // ============================================
        // CHECK ON LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM loaded');
            
            if (isAppInstalled()) {
                console.log('✅ App already installed - hiding banner');
                hideBanner();
                return;
            }
            
            console.log('🔍 Checking PWA status...');
            console.log('   - HTTPS:', window.location.protocol === 'https:' ? '✅' : '❌');
            console.log('   - Manifest:', document.querySelector('link[rel="manifest"]') ? '✅' : '❌');
            console.log('   - Service Worker:', 'serviceWorker' in navigator ? '✅' : '❌');
            
            // Show the correct banner based on browser
            setTimeout(function() {
                if (deferredPrompt) {
                    console.log('✅ deferredPrompt exists - showing banner');
                    checkAndShowInstallBanner();
                } else {
                    console.log('⏳ deferredPrompt not yet available');
                    // Try showing instructions for non-Chrome browsers
                    checkAndShowInstallBanner();
                    // Try again after 5 seconds
                    setTimeout(function() {
                        if (deferredPrompt) {
                            console.log('✅ deferredPrompt now exists - showing banner');
                            checkAndShowInstallBanner();
                        } else {
                            console.log('❌ deferredPrompt still not available');
                            // Try showing instructions for non-Chrome browsers again
                            checkAndShowInstallBanner();
                        }
                    }, 5000);
                }
            }, 2000);
        });
        
        // Check when user comes back
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('👁️ Page became visible');
                if (!isAppInstalled()) {
                    checkAndShowInstallBanner();
                }
            }
        });
        
        // ============================================
        // SERVICE WORKER WITH VERSIONING
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/tadaa-marketplace/sw.js')
                    .then(function(reg) {
                        console.log('✅ Service Worker registered');
                    })
                    .catch(function(err) {
                        console.log('❌ Service Worker error:', err);
                    });
            });
        }
        
        console.log('✅ Tadaa! PWA ready');
    </script>
</body>
</html>
