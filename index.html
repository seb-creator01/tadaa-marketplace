<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        #installBanner { display: none; background: #FFD700; padding: 12px 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 99; }
        #installBanner.show { display: flex !important; }
        #installBanner button { border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Cormorant Garamond', serif; }
        .btn-install { background: #000; color: #FFD700; }
        .btn-install:hover { background: #1a1a1a; }
        .btn-cancel { background: transparent; color: #000; border: 2px solid #000 !important; }
        .btn-cancel:hover { background: #000; color: #fff; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        #installBanner.show { animation: slideDown 0.5s ease; }
        
        /* ===== SPLASH SCREEN STYLES ===== */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #splashScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .splash-container {
            text-align: center;
            padding: 20px;
            animation: splashPulse 2s ease-in-out infinite;
        }
        @keyframes splashPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .splash-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 56px;
            font-weight: 700;
            color: #FFD700;
            letter-spacing: 2px;
            display: block;
        }
        .splash-exclamation {
            color: #FFFFFF;
        }
        .splash-loader {
            width: 200px;
            height: 4px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            margin: 24px auto 16px;
            overflow: hidden;
            position: relative;
        }
        .splash-loader-bar {
            width: 40%;
            height: 100%;
            background: #FFD700;
            border-radius: 10px;
            animation: splashLoader 1.2s ease-in-out infinite;
            position: absolute;
            top: 0;
            left: 0;
        }
        @keyframes splashLoader {
            0% { left: -40%; width: 40%; }
            50% { width: 60%; }
            100% { left: 100%; width: 40%; }
        }
        .splash-subtitle {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }
        @media (max-width: 768px) {
            .splash-brand { font-size: 40px; }
            .splash-loader { width: 160px; }
            .splash-subtitle { font-size: 12px; letter-spacing: 3px; }
        }
        @media (max-width: 480px) {
            .splash-brand { font-size: 32px; }
            .splash-loader { width: 140px; }
            .splash-subtitle { font-size: 10px; letter-spacing: 2px; }
        }

        /* ===== TRACK ORDER SECTION STYLES ===== */
        .track-section {
            background: var(--bg-card);
            border-radius: 16px;
            margin: 20px auto;
            max-width: 1200px;
            padding: 32px 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        .track-section .track-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .track-section .track-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .track-section .track-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--text-primary);
            margin: 0 0 8px;
        }
        .track-section .track-subtitle {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 16px;
        }
        .track-section .track-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .track-section .track-input {
            flex: 1;
            min-width: 200px;
            max-width: 350px;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.3s;
        }
        .track-section .track-input:focus {
            border-color: #FFD700;
        }
        .track-section .track-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .track-section .track-btn:hover {
            background: #E6C200;
        }
        .track-section .track-btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .track-section .track-btn-outline:hover {
            background: var(--border-color);
        }
        .track-section .track-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
        }
        .track-section .track-divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .track-section .track-divider-text {
            color: var(--text-muted);
            font-size: 14px;
        }
        .track-section .track-error {
            color: #EF4444;
            margin-top: 10px;
            display: none;
            font-size: 14px;
        }
        @media (max-width: 480px) {
            .track-section .track-title { font-size: 22px; }
            .track-section .track-input { min-width: 100%; max-width: 100%; }
            .track-section .track-btn { width: 100%; }
            .track-section .track-btn-outline { width: 100%; }
        }
    </style>
</head>
<body>
    
    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splashScreen">
        <div class="splash-container">
            <div class="splash-logo">
                <span class="splash-brand">Tadaa<span class="splash-exclamation">!</span></span>
            </div>
            <div class="splash-loader">
                <div class="splash-loader-bar"></div>
            </div>
            <p class="splash-subtitle">Your premium online marketplace</p>
        </div>
    </div>
    
    <div id="app">
        <!-- Install Banner -->
        <div id="installBanner">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">📲</span>
                <div>
                    <span style="font-weight:700; font-size:16px; color:#000;">Install Tadaa! App</span>
                    <span style="font-size:12px; color:#333; display:block;" id="installSubtext">Get the full app experience</span>
                </div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-install" id="installBtn">📲 Install</button>
                <button class="btn-cancel" id="cancelInstallBtn">Not Now</button>
            </div>
        </div>
        
        <header id="main-header"></header>
        <section id="hero-section"></section>

        <!-- ===== TRACK YOUR ORDER SECTION ===== -->
        <section class="track-section" id="trackOrderSection">
            <div class="track-container">
                <div class="track-icon">📦</div>
                <h2 class="track-title">Track Your Order</h2>
                <p class="track-subtitle">Enter your phone number to see all your orders</p>
                
                <!-- Phone Number Input -->
                <div class="track-input-group">
                    <input type="tel" class="track-input" id="trackPhoneInput" placeholder="e.g., 08012345678">
                    <button class="track-btn" onclick="findOrdersByPhone()">🔍 Find My Orders</button>
                </div>
                
                <!-- Or Divider -->
                <div class="track-divider">
                    <div class="track-divider-line"></div>
                    <span class="track-divider-text">or</span>
                    <div class="track-divider-line"></div>
                </div>
                
                <!-- Order ID Input (Alternative) -->
                <div class="track-input-group">
                    <input type="text" class="track-input" id="trackOrderInput" placeholder="Order ID (e.g., TAD-20260716-123456)">
                    <button class="track-btn-outline" onclick="trackByOrderId()">Track by Order ID</button>
                </div>
                
                <div class="track-error" id="trackError"></div>
            </div>
        </section>

        <section id="announcement-section"></section>
        <section id="categories-section" style="padding: 30px 0;"></section>
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        <footer id="main-footer"></footer>
    </div>
    
    <script src="./assets/js/customer/app.js"></script>
    
    <script>
        console.log('🚀 Tadaa! PWA loaded');
        
        let deferredPrompt = null;
        let installBannerShown = false;
        
        const banner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const cancelBtn = document.getElementById('cancelInstallBtn');
        const installSubtext = document.getElementById('installSubtext');
        
        // ============================================
        // DETECT BROWSER
        // ============================================
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            const isSamsung = ua.includes('Samsung') || ua.includes('SM-');
            const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
            const isChrome = /chrome/i.test(ua) && !ua.includes('Samsung');
            const isIOS = /iphone|ipad|ipod/i.test(ua);
            const isAndroid = /android/i.test(ua);
            
            return { isSamsung, isSafari, isChrome, isIOS, isAndroid };
        }
        
        // ============================================
        // CHECK IF APP IS INSTALLED
        // ============================================
        function isAppInstalled() {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                console.log('✅ App is already installed (standalone mode)');
                return true;
            }
            if (window.navigator.standalone) {
                console.log('✅ App is already installed (iOS)');
                return true;
            }
            return false;
        }
        
        // ============================================
        // SHOW / HIDE BANNER
        // ============================================
        function showBanner() {
            if (!banner) return;
            if (isAppInstalled()) { banner.classList.remove('show'); return; }
            if (sessionStorage.getItem('installDeclined') === 'true') { banner.classList.remove('show'); return; }
            
            const browser = getBrowserInfo();
            
            // For Chrome Android - use deferredPrompt
            if (browser.isChrome && browser.isAndroid) {
                if (!deferredPrompt) {
                    console.log('⏳ No deferredPrompt, banner hidden');
                    banner.classList.remove('show');
                    return;
                }
            }
            
            console.log('📲 Showing install banner');
            banner.classList.add('show');
            installBannerShown = true;
        }
        
        function hideBanner() {
            if (banner) banner.classList.remove('show');
        }
        
        // ============================================
        // SHOW INSTALL INSTRUCTIONS
        // ============================================
        function showInstallInstructions() {
            const browser = getBrowserInfo();
            
            const instructions = document.createElement('div');
            instructions.id = 'installInstructions';
            instructions.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.8); z-index: 10000;
                display: flex; align-items: center; justify-content: center;
                padding: 20px;
            `;
            instructions.innerHTML = `
                <div style="background: #fff; border-radius: 24px; max-width: 400px; width: 100%; padding: 32px; text-align: center; position: relative;">
                    <button onclick="this.closest('#installInstructions').remove()" style="position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">✕</button>
                    <div style="font-size: 48px; margin-bottom: 16px;">📱</div>
                    <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #000; margin: 0 0 8px;">Install Tadaa!</h2>
                    <p style="color: #666; margin-bottom: 20px; line-height: 1.5;">Get the full app experience on your device</p>
                    <div style="text-align: left; background: #f5f5f5; padding: 16px; border-radius: 12px; margin-bottom: 20px;">
                        <p style="font-weight: 600; margin: 0 0 8px; color: #000;">${browser.isSafari || browser.isIOS ? '📲 On iPhone/iPad:' : '📲 On Samsung Internet:'}</p>
                        <ol style="margin: 0; padding-left: 20px; color: #333; line-height: 2;">
                            ${browser.isSafari || browser.isIOS ? `
                                <li>Tap the <strong>Share</strong> icon <span style="font-size:18px;">⬆️</span></li>
                                <li>Scroll down and tap <strong>"Add to Home Screen"</strong></li>
                                <li>Tap <strong>"Add"</strong> in the top right</li>
                            ` : `
                                <li>Tap the <strong>☰</strong> menu icon</li>
                                <li>Select <strong>"Add to Home Screen"</strong></li>
                                <li>Tap <strong>"Add"</strong> to install</li>
                            `}
                        </ol>
                    </div>
                    <button onclick="this.closest('#installInstructions').remove()" style="background: #FFD700; color: #000; border: none; padding: 12px 32px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer;">Got it!</button>
                </div>
            `;
            document.body.appendChild(instructions);
        }
        
        // ============================================
        // CHECK AND SHOW CORRECT BANNER
        // ============================================
        function checkAndShowInstallBanner() {
            const browser = getBrowserInfo();
            
            // If already installed, hide banner
            if (isAppInstalled()) {
                banner.classList.remove('show');
                return;
            }
            
            // For Chrome Android - use beforeinstallprompt
            if (browser.isChrome && browser.isAndroid) {
                if (deferredPrompt) {
                    banner.classList.add('show');
                    if (installBtn) installBtn.textContent = '📲 Install';
                    if (installSubtext) installSubtext.textContent = 'Get the full app experience';
                }
                return;
            }
            
            // For Samsung Internet and iPhone - show instructions
            if (browser.isSamsung || browser.isSafari || browser.isIOS) {
                banner.classList.add('show');
                if (installBtn) installBtn.textContent = '📱 Install App';
                if (installSubtext) installSubtext.textContent = 'Add to your home screen';
                return;
            }
        }
        
        // ============================================
        // INSTALL BUTTON
        // ============================================
        if (installBtn) {
            installBtn.addEventListener('click', function() {
                console.log('📲 Install button clicked');
                
                const browser = getBrowserInfo();
                
                if (isAppInstalled()) {
                    console.log('⏭️ Already installed');
                    hideBanner();
                    return;
                }
                
                // For Chrome Android - use native prompt
                if (browser.isChrome && browser.isAndroid) {
                    if (deferredPrompt) {
                        console.log('📲 Showing native install prompt');
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then(function(result) {
                            if (result.outcome === 'accepted') {
                                console.log('✅ App installed successfully!');
                                hideBanner();
                                sessionStorage.removeItem('installDeclined');
                            } else {
                                console.log('❌ User declined');
                                hideBanner();
                                sessionStorage.setItem('installDeclined', 'true');
                            }
                            deferredPrompt = null;
                        });
                    } else {
                        console.log('❌ No deferredPrompt available');
                        hideBanner();
                        sessionStorage.setItem('installDeclined', 'true');
                    }
                } else {
                    // For Samsung/iPhone - show instructions
                    showInstallInstructions();
                }
            });
        }
        
        // ============================================
        // CANCEL BUTTON
        // ============================================
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                console.log('❌ User cancelled');
                hideBanner();
                sessionStorage.setItem('installDeclined', 'true');
            });
        }
        
        // ============================================
        // CAPTURE INSTALL PROMPT - THIS IS KEY
        // ============================================
        window.addEventListener('beforeinstallprompt', function(e) {
            console.log('📲 beforeinstallprompt event FIRED!');
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ deferredPrompt saved');
            checkAndShowInstallBanner();
        });
        
        // ============================================
        // APP INSTALLED
        // ============================================
        window.addEventListener('appinstalled', function() {
            console.log('✅ App installed successfully!');
            hideBanner();
        });
        
        // ============================================
        // CHECK ON LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM loaded');
            
            if (isAppInstalled()) {
                console.log('✅ App already installed - hiding banner');
                hideBanner();
                return;
            }
            
            console.log('🔍 Checking PWA status...');
            console.log('   - HTTPS:', window.location.protocol === 'https:' ? '✅' : '❌');
            console.log('   - Manifest:', document.querySelector('link[rel="manifest"]') ? '✅' : '❌');
            console.log('   - Service Worker:', 'serviceWorker' in navigator ? '✅' : '❌');
            
            // Show the correct banner based on browser
            setTimeout(function() {
                if (deferredPrompt) {
                    console.log('✅ deferredPrompt exists - showing banner');
                    checkAndShowInstallBanner();
                } else {
                    console.log('⏳ deferredPrompt not yet available');
                    // Try showing instructions for non-Chrome browsers
                    checkAndShowInstallBanner();
                    // Try again after 5 seconds
                    setTimeout(function() {
                        if (deferredPrompt) {
                            console.log('✅ deferredPrompt now exists - showing banner');
                            checkAndShowInstallBanner();
                        } else {
                            console.log('❌ deferredPrompt still not available');
                            // Try showing instructions for non-Chrome browsers again
                            checkAndShowInstallBanner();
                        }
                    }, 5000);
                }
            }, 2000);
        });
        
        // Check when user comes back
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('👁️ Page became visible');
                if (!isAppInstalled()) {
                    checkAndShowInstallBanner();
                }
            }
        });
        
        // ============================================
        // SERVICE WORKER WITH VERSIONING - FIXED PATH
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js')
                    .then(function(reg) {
                        console.log('✅ Service Worker registered');
                    })
                    .catch(function(err) {
                        console.log('❌ Service Worker error:', err);
                    });
            });
        }

        // ============================================
        // TRACK ORDER FUNCTIONS
        // ============================================
        function findOrdersByPhone() {
            const input = document.getElementById('trackPhoneInput');
            const error = document.getElementById('trackError');
            const phone = input?.value?.trim();
            
            if (!phone) {
                if (error) {
                    error.textContent = 'Please enter your phone number';
                    error.style.display = 'block';
                }
                return;
            }
            
            // Basic validation - Nigerian phone number format
            const phoneClean = phone.replace(/\s/g, '');
            if (!phoneClean.match(/^0[789][01]\d{8}$|^\+234[789][01]\d{8}$/)) {
                if (error) {
                    error.textContent = 'Please enter a valid phone number (e.g., 08012345678)';
                    error.style.display = 'block';
                }
                return;
            }
            
            if (error) {
                error.style.display = 'none';
            }
            
            // Redirect to tracking page with phone number
            window.location.href = `./tracking.html?phone=${encodeURIComponent(phone)}`;
        }

        function trackByOrderId() {
            const input = document.getElementById('trackOrderInput');
            const error = document.getElementById('trackError');
            const orderId = input?.value?.trim();
            
            if (!orderId) {
                if (error) {
                    error.textContent = 'Please enter your Order ID';
                    error.style.display = 'block';
                }
                return;
            }
            
            // Basic validation - should start with TAD-
            if (!orderId.startsWith('TAD-')) {
                if (error) {
                    error.textContent = 'Please enter a valid Order ID (e.g., TAD-20260716-123456)';
                    error.style.display = 'block';
                }
                return;
            }
            
            if (error) {
                error.style.display = 'none';
            }
            
            // Redirect to tracking page with order ID
            window.location.href = `./tracking.html?order=${orderId}`;
        }

        // Allow Enter key to trigger tracking
        document.addEventListener('DOMContentLoaded', function() {
            const phoneInput = document.getElementById('trackPhoneInput');
            const orderInput = document.getElementById('trackOrderInput');
            
            if (phoneInput) {
                phoneInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        findOrdersByPhone();
                    }
                });
            }
            
            if (orderInput) {
                orderInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        trackByOrderId();
                    }
                });
            }
        });
        
        console.log('✅ Tadaa! PWA ready');
    </script>
</body>
</html>
