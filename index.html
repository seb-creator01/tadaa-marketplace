<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <meta name="keywords" content="marketplace, online shopping, Nigeria, Tadaa, buy online" />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/tadaa-marketplace/manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon -->
    <link rel="icon" href="/tadaa-marketplace/favicon.ico" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="/tadaa-marketplace/assets/css/main.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        /* Install Banner - Simple Version */
        #installBanner {
            display: none;
            background: #FFD700;
            padding: 12px 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 99;
            border-bottom: 2px solid #000;
        }
        #installBanner.show {
            display: flex !important;
        }
        #installBanner button {
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cormorant Garamond', serif;
        }
        .btn-install {
            background: #000;
            color: #FFD700;
        }
        .btn-install:hover {
            background: #1a1a1a;
        }
        .btn-cancel {
            background: transparent;
            color: #000;
            border: 2px solid #000 !important;
        }
        .btn-cancel:hover {
            background: #000;
            color: #fff;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #installBanner.show {
            animation: slideDown 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Install Banner - SIMPLE VERSION -->
        <div id="installBanner">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">📲</span>
                <div>
                    <span style="font-weight:700; font-size:16px; color:#000;">Install Tadaa! App</span>
                    <span style="font-size:12px; color:#333; display:block;">Add to home screen for faster shopping</span>
                </div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-install" id="installBtn">📲 Install</button>
                <button class="btn-cancel" id="cancelInstallBtn">Not Now</button>
            </div>
        </div>
        
        <!-- Header -->
        <header id="main-header"></header>
        
        <!-- Hero Section -->
        <section id="hero-section"></section>
        
        <!-- Announcement Section -->
        <section id="announcement-section"></section>
        
        <!-- Categories Section -->
        <section id="categories-section" style="padding: 30px 0;"></section>
        
        <!-- Products Section -->
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        
        <!-- Footer -->
        <footer id="main-footer"></footer>
    </div>
    
    <!-- Customer App -->
    <script src="/tadaa-marketplace/assets/js/customer/app.js"></script>
    
    <!-- ============================================
         SIMPLE PWA INSTALL
         ============================================ -->
    <script>
        console.log('🚀 Tadaa! PWA loaded');
        
        // ============================================
        // CHECK IF APP IS INSTALLED
        // ============================================
        function isAppInstalled() {
            if (window.matchMedia('(display-mode: standalone)').matches) return true;
            if (window.navigator.standalone) return true;
            return false;
        }
        
        // ============================================
        // SHOW INSTALL BANNER
        // ============================================
        function showInstallBanner() {
            const banner = document.getElementById('installBanner');
            if (!banner) return;
            
            // Don't show if already installed
            if (isAppInstalled()) {
                console.log('✅ App already installed, hiding banner');
                banner.classList.remove('show');
                return;
            }
            
            // Don't show if user declined this session
            if (sessionStorage.getItem('installDeclined') === 'true') {
                console.log('⏭️ User declined this session');
                banner.classList.remove('show');
                return;
            }
            
            // Show the banner
            console.log('📲 Showing install banner');
            banner.classList.add('show');
        }
        
        // ============================================
        // HIDE INSTALL BANNER
        // ============================================
        function hideInstallBanner() {
            const banner = document.getElementById('installBanner');
            if (banner) {
                banner.classList.remove('show');
            }
        }
        
        // ============================================
        // INSTALL BUTTON
        // ============================================
        document.getElementById('installBtn').addEventListener('click', function() {
            console.log('📲 Install button clicked');
            
            // Try the native install prompt first
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        console.log('✅ App installed!');
                        hideInstallBanner();
                    } else {
                        console.log('❌ User declined');
                        hideInstallBanner();
                        sessionStorage.setItem('installDeclined', 'true');
                    }
                    window.deferredPrompt = null;
                });
                return;
            }
            
            // Fallback: Show instructions
            var message = '📲 To install Tadaa! on your phone:\n\n';
            message += '• On Android: Tap the three dots (⋮) → "Install app"\n';
            message += '• On iPhone: Tap the share icon (□↑) → "Add to Home Screen"\n\n';
            message += 'This will add Tadaa! to your home screen like a real app!';
            
            alert(message);
            hideInstallBanner();
            sessionStorage.setItem('installDeclined', 'true');
        });
        
        // ============================================
        // CANCEL BUTTON
        // ============================================
        document.getElementById('cancelInstallBtn').addEventListener('click', function() {
            console.log('❌ User clicked Not Now');
            hideInstallBanner();
            sessionStorage.setItem('installDeclined', 'true');
        });
        
        // ============================================
        // CAPTURE INSTALL PROMPT
        // ============================================
        window.addEventListener('beforeinstallprompt', function(e) {
            console.log('📲 Install prompt captured');
            e.preventDefault();
            window.deferredPrompt = e;
            
            // Show banner after a delay
            setTimeout(showInstallBanner, 1500);
        });
        
        // ============================================
        // APP INSTALLED
        // ============================================
        window.addEventListener('appinstalled', function() {
            console.log('✅ App installed!');
            hideInstallBanner();
        });
        
        // ============================================
        // SHOW BANNER ON PAGE LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM loaded');
            
            // Wait 2 seconds, then show banner
            setTimeout(function() {
                showInstallBanner();
            }, 2000);
        });
        
        // Check when user comes back
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                setTimeout(showInstallBanner, 500);
            }
        });
        
        // ============================================
        // SERVICE WORKER
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/tadaa-marketplace/sw.js')
                    .then(function(reg) {
                        console.log('✅ Service Worker registered');
                    })
                    .catch(function(err) {
                        console.log('❌ Service Worker error:', err);
                    });
            });
        }
        
        console.log('✅ Tadaa! PWA ready - banner will show in 2 seconds');
    </script>
</body>
</html>
