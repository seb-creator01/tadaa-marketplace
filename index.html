<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <meta name="keywords" content="marketplace, online shopping, Nigeria, Tadaa, buy online" />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/tadaa-marketplace/manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon -->
    <link rel="icon" href="/tadaa-marketplace/favicon.ico" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="/tadaa-marketplace/assets/css/main.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        #installBanner { display: none; background: #FFD700; padding: 12px 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 99; }
        #installBanner.show { display: flex !important; }
        #installBanner button { border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Cormorant Garamond', serif; }
        .btn-install { background: #000; color: #FFD700; }
        .btn-install:hover { background: #1a1a1a; }
        .btn-cancel { background: transparent; color: #000; border: 2px solid #000 !important; }
        .btn-cancel:hover { background: #000; color: #fff; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        #installBanner.show { animation: slideDown 0.5s ease; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Install Banner -->
        <div id="installBanner">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">📲</span>
                <div>
                    <span style="font-weight:700; font-size:16px; color:#000;">Install Tadaa! App</span>
                    <span style="font-size:12px; color:#333; display:block;">Get the full app experience</span>
                </div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-install" id="installBtn">📲 Install</button>
                <button class="btn-cancel" id="cancelInstallBtn">Not Now</button>
            </div>
        </div>
        
        <header id="main-header"></header>
        <section id="hero-section"></section>
        <section id="announcement-section"></section>
        <section id="categories-section" style="padding: 30px 0;"></section>
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        <footer id="main-footer"></footer>
    </div>
    
    <script src="/tadaa-marketplace/assets/js/customer/app.js"></script>
    
    <script>
        console.log('🚀 Tadaa! PWA loaded');
        console.log('🔍 Checking PWA installability...');
        
        // ============================================
        // CHECK IF APP IS INSTALLED
        // ============================================
        function isAppInstalled() {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                console.log('✅ App is already installed (standalone mode)');
                return true;
            }
            if (window.navigator.standalone) {
                console.log('✅ App is already installed (iOS standalone)');
                return true;
            }
            return false;
        }
        
        // ============================================
        // CHECK PWA REQUIREMENTS
        // ============================================
        function checkPWARequirements() {
            const requirements = [];
            
            // Check HTTPS
            if (window.location.protocol === 'https:') {
                requirements.push('✅ HTTPS');
            } else {
                requirements.push('❌ HTTPS (required)');
            }
            
            // Check manifest
            const manifestLink = document.querySelector('link[rel="manifest"]');
            if (manifestLink) {
                requirements.push('✅ Manifest link exists');
            } else {
                requirements.push('❌ Manifest link (required)');
            }
            
            // Check service worker
            if ('serviceWorker' in navigator) {
                requirements.push('✅ Service Worker support');
            } else {
                requirements.push('❌ Service Worker (required)');
            }
            
            console.log('📋 PWA Requirements:', requirements);
            return requirements;
        }
        
        // ============================================
        // SHOW / HIDE BANNER
        // ============================================
        function showInstallBanner() {
            const banner = document.getElementById('installBanner');
            if (!banner) return;
            
            // Check if already installed
            if (isAppInstalled()) {
                console.log('⏭️ App already installed, hiding banner');
                banner.classList.remove('show');
                return;
            }
            
            // Check if user declined this session
            if (sessionStorage.getItem('installDeclined') === 'true') {
                console.log('⏭️ User declined this session, hiding banner');
                banner.classList.remove('show');
                return;
            }
            
            // Only show if deferredPrompt exists
            if (window.deferredPrompt) {
                console.log('📲 Showing install banner (deferredPrompt available)');
                banner.classList.add('show');
            } else {
                console.log('⏳ deferredPrompt not available yet, waiting...');
                banner.classList.remove('show');
            }
        }
        
        function hideInstallBanner() {
            const banner = document.getElementById('installBanner');
            if (banner) banner.classList.remove('show');
        }
        
        // ============================================
        // INSTALL BUTTON - NO ALERTS
        // ============================================
        document.getElementById('installBtn').addEventListener('click', function() {
            console.log('📲 Install button clicked');
            
            // Check if already installed
            if (isAppInstalled()) {
                console.log('⏭️ App already installed');
                hideInstallBanner();
                return;
            }
            
            // Check if we have the install prompt
            if (window.deferredPrompt) {
                console.log('📲 Showing native install prompt');
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        console.log('✅ App installed successfully!');
                        hideInstallBanner();
                    } else {
                        console.log('❌ User declined install');
                        hideInstallBanner();
                        sessionStorage.setItem('installDeclined', 'true');
                    }
                    window.deferredPrompt = null;
                });
                return;
            }
            
            // No install prompt available
            console.log('❌ No install prompt available');
            hideInstallBanner();
            sessionStorage.setItem('installDeclined', 'true');
        });
        
        // ============================================
        // CANCEL BUTTON
        // ============================================
        document.getElementById('cancelInstallBtn').addEventListener('click', function() {
            console.log('❌ User clicked Not Now');
            hideInstallBanner();
            sessionStorage.setItem('installDeclined', 'true');
        });
        
        // ============================================
        // CAPTURE INSTALL PROMPT
        // ============================================
        window.addEventListener('beforeinstallprompt', function(e) {
            console.log('📲 beforeinstallprompt event FIRED!');
            e.preventDefault();
            window.deferredPrompt = e;
            
            console.log('✅ deferredPrompt is now available');
            
            // Show banner after a short delay
            setTimeout(function() {
                showInstallBanner();
            }, 1000);
        });
        
        // ============================================
        // APP INSTALLED EVENT
        // ============================================
        window.addEventListener('appinstalled', function() {
            console.log('✅ App installed successfully!');
            hideInstallBanner();
        });
        
        // ============================================
        // CHECK PWA REQUIREMENTS ON LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM loaded');
            
            // Check PWA requirements
            const requirements = checkPWARequirements();
            
            // Wait 3 seconds, then check if deferredPrompt exists
            setTimeout(function() {
                if (window.deferredPrompt) {
                    console.log('✅ deferredPrompt is available - app is installable');
                    showInstallBanner();
                } else {
                    console.log('❌ deferredPrompt is NOT available');
                    console.log('💡 This means the browser is not allowing installation.');
                    console.log('🔍 Possible reasons:');
                    console.log('   - App already installed');
                    console.log('   - User previously declined');
                    console.log('   - Browser does not support PWA');
                    console.log('   - Not meeting PWA criteria');
                    
                    // Check if already installed
                    if (isAppInstalled()) {
                        console.log('✅ App is already installed - banner hidden');
                        hideInstallBanner();
                    } else {
                        console.log('📲 App is not installed but prompt not available');
                        // Don't show banner if no deferredPrompt
                        hideInstallBanner();
                    }
                }
            }, 3000);
        });
        
        // Check when user comes back to page
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('👁️ Page became visible');
                setTimeout(function() {
                    if (window.deferredPrompt && !isAppInstalled()) {
                        showInstallBanner();
                    } else {
                        hideInstallBanner();
                    }
                }, 500);
            }
        });
        
        // ============================================
        // SERVICE WORKER
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/tadaa-marketplace/sw.js')
                    .then(function(reg) {
                        console.log('✅ Service Worker registered successfully');
                    })
                    .catch(function(err) {
                        console.log('❌ Service Worker registration failed:', err);
                    });
            });
        }
        
        console.log('✅ Tadaa! PWA ready with debug logging');
        console.log('📱 Open the console to see install status');
    </script>
</body>
</html>
