<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <meta name="keywords" content="marketplace, online shopping, Nigeria, Tadaa, buy online" />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <link rel="manifest" href="/tadaa-marketplace/manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="icon" href="/tadaa-marketplace/favicon.ico" />
    <link rel="stylesheet" href="/tadaa-marketplace/assets/css/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        #installBanner { display: none; background: #FFD700; padding: 12px 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 99; }
        #installBanner.show { display: flex !important; }
        #installBanner button { border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Cormorant Garamond', serif; }
        .btn-install { background: #000; color: #FFD700; }
        .btn-install:hover { background: #1a1a1a; }
        .btn-cancel { background: transparent; color: #000; border: 2px solid #000 !important; }
        .btn-cancel:hover { background: #000; color: #fff; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        #installBanner.show { animation: slideDown 0.5s ease; }
        
        /* Debug Status Bar */
        #pwaStatus {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #000;
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 9998;
            font-family: 'Courier New', monospace;
            text-align: center;
            border-left: 4px solid #FFD700;
            max-width: 400px;
            margin: 0 auto;
        }
        #pwaStatus .status-ok { color: #10B981; }
        #pwaStatus .status-error { color: #EF4444; }
        #pwaStatus .status-waiting { color: #F59E0B; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Install Banner -->
        <div id="installBanner">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">📲</span>
                <div>
                    <span style="font-weight:700; font-size:16px; color:#000;">Install Tadaa! App</span>
                    <span style="font-size:12px; color:#333; display:block;">Get the full app experience</span>
                </div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-install" id="installBtn">📲 Install</button>
                <button class="btn-cancel" id="cancelInstallBtn">Not Now</button>
            </div>
        </div>
        
        <header id="main-header"></header>
        <section id="hero-section"></section>
        <section id="announcement-section"></section>
        <section id="categories-section" style="padding: 30px 0;"></section>
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        <footer id="main-footer"></footer>
    </div>
    
    <!-- PWA Status Bar -->
    <div id="pwaStatus">
        <span id="pwaStatusText">🔍 Checking PWA install status...</span>
    </div>
    
    <script src="/tadaa-marketplace/assets/js/customer/app.js"></script>
    
    <script>
        console.log('🚀 Tadaa! PWA loaded');
        
        // ============================================
        // UPDATE STATUS DISPLAY
        // ============================================
        function updateStatus(message, type) {
            const statusEl = document.getElementById('pwaStatusText');
            if (statusEl) {
                statusEl.textContent = message;
                statusEl.className = type || '';
            }
            console.log('📊 Status:', message);
        }
        
        // ============================================
        // CHECK IF APP IS INSTALLED
        // ============================================
        function isAppInstalled() {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                updateStatus('✅ App is already installed!', 'status-ok');
                return true;
            }
            if (window.navigator.standalone) {
                updateStatus('✅ App is already installed (iOS)', 'status-ok');
                return true;
            }
            return false;
        }
        
        // ============================================
        // SHOW / HIDE BANNER
        // ============================================
        function showInstallBanner() {
            const banner = document.getElementById('installBanner');
            if (!banner) return;
            
            if (isAppInstalled()) {
                banner.classList.remove('show');
                return;
            }
            
            if (sessionStorage.getItem('installDeclined') === 'true') {
                banner.classList.remove('show');
                updateStatus('⏭️ You declined install this session', 'status-waiting');
                return;
            }
            
            if (window.deferredPrompt) {
                banner.classList.add('show');
                updateStatus('📲 Tap "Install" to add Tadaa! to your phone', 'status-ok');
            } else {
                banner.classList.remove('show');
                updateStatus('⏳ Waiting for install prompt...', 'status-waiting');
            }
        }
        
        function hideInstallBanner() {
            const banner = document.getElementById('installBanner');
            if (banner) banner.classList.remove('show');
        }
        
        // ============================================
        // INSTALL BUTTON
        // ============================================
        document.getElementById('installBtn').addEventListener('click', function() {
            console.log('📲 Install button clicked');
            
            if (isAppInstalled()) {
                updateStatus('✅ App already installed!', 'status-ok');
                hideInstallBanner();
                return;
            }
            
            if (window.deferredPrompt) {
                updateStatus('📲 Showing install prompt...', 'status-waiting');
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        updateStatus('✅ App installed successfully! 🎉', 'status-ok');
                        hideInstallBanner();
                    } else {
                        updateStatus('❌ You declined the install', 'status-error');
                        hideInstallBanner();
                        sessionStorage.setItem('installDeclined', 'true');
                    }
                    window.deferredPrompt = null;
                });
                return;
            }
            
            // No install prompt
            updateStatus('❌ Cannot install right now. Try using Chrome browser.', 'status-error');
            hideInstallBanner();
            sessionStorage.setItem('installDeclined', 'true');
        });
        
        // ============================================
        // CANCEL BUTTON
        // ============================================
        document.getElementById('cancelInstallBtn').addEventListener('click', function() {
            console.log('❌ User clicked Not Now');
            hideInstallBanner();
            sessionStorage.setItem('installDeclined', 'true');
            updateStatus('⏭️ Install declined this session', 'status-waiting');
        });
        
        // ============================================
        // CAPTURE INSTALL PROMPT
        // ============================================
        window.addEventListener('beforeinstallprompt', function(e) {
            console.log('📲 beforeinstallprompt event FIRED!');
            e.preventDefault();
            window.deferredPrompt = e;
            updateStatus('✅ App is ready to install! Tap "Install" above.', 'status-ok');
            setTimeout(showInstallBanner, 1000);
        });
        
        // ============================================
        // APP INSTALLED EVENT
        // ============================================
        window.addEventListener('appinstalled', function() {
            console.log('✅ App installed successfully!');
            updateStatus('✅ App installed! 🎉', 'status-ok');
            hideInstallBanner();
        });
        
        // ============================================
        // INITIALIZE
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM loaded');
            
            // Check if already installed
            if (isAppInstalled()) {
                updateStatus('✅ App is already installed!', 'status-ok');
                hideInstallBanner();
                return;
            }
            
            updateStatus('🔍 Checking if app can be installed...', 'status-waiting');
            
            // Check after 3 seconds
            setTimeout(function() {
                if (window.deferredPrompt) {
                    updateStatus('✅ App is ready to install!', 'status-ok');
                    showInstallBanner();
                } else {
                    updateStatus('⏳ Waiting for install prompt. Try refreshing.', 'status-waiting');
                    // Try again after 5 more seconds
                    setTimeout(function() {
                        if (window.deferredPrompt) {
                            updateStatus('✅ App is ready to install!', 'status-ok');
                            showInstallBanner();
                        } else {
                            updateStatus('❌ Install not available. Use Chrome browser.', 'status-error');
                        }
                    }, 5000);
                }
            }, 3000);
        });
        
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('👁️ Page became visible');
                setTimeout(function() {
                    if (window.deferredPrompt && !isAppInstalled()) {
                        showInstallBanner();
                        updateStatus('✅ App is ready to install!', 'status-ok');
                    }
                }, 500);
            }
        });
        
        // ============================================
        // SERVICE WORKER
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/tadaa-marketplace/sw.js')
                    .then(function(reg) {
                        console.log('✅ Service Worker registered');
                    })
                    .catch(function(err) {
                        console.log('❌ Service Worker error:', err);
                    });
            });
        }
        
        console.log('✅ Tadaa! PWA ready');
    </script>
</body>
</html>
