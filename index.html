<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadaa! - Premium Online Marketplace</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Shop premium products at Tadaa! - Your trusted online marketplace in Nigeria." />
    <meta name="keywords" content="marketplace, online shopping, Nigeria, Tadaa, buy online" />
    <link rel="canonical" href="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Tadaa! - Premium Online Marketplace" />
    <meta property="og:description" content="Shop premium products at Tadaa!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seb-creator01.github.io/tadaa-marketplace/" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/tadaa-marketplace/manifest.json" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon -->
    <link rel="icon" href="/tadaa-marketplace/favicon.ico" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="/tadaa-marketplace/assets/css/main.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header will be injected here -->
        <header id="main-header"></header>
        
        <!-- Hero Section -->
        <section id="hero-section"></section>
        
        <!-- Announcement Section -->
        <section id="announcement-section"></section>
        
        <!-- Categories Section -->
        <section id="categories-section" style="padding: 30px 0;"></section>
        
        <!-- Products Section -->
        <section id="products-section" style="padding: 20px 0 40px;"></section>
        
        <!-- Footer will be injected here -->
        <footer id="main-footer"></footer>
    </div>
    
    <!-- Customer App -->
    <script src="/tadaa-marketplace/assets/js/customer/app.js"></script>
    
    <!-- ============================================
         REGISTER SERVICE WORKER (PWA)
         ============================================ -->
    <script>
        // ============================================
        // REGISTER SERVICE WORKER (PWA)
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/tadaa-marketplace/sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registered successfully!');
                        console.log('📱 App can now be installed!');
                        
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('🔄 New Service Worker installing...');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('🔄 Update available!');
                                    showUpdateNotification();
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.log('❌ Service Worker registration failed:', error);
                    });
            });
        } else {
            console.log('❌ Service Workers not supported in this browser');
        }
        
        // ============================================
        // SHOW UPDATE NOTIFICATION
        // ============================================
        function showUpdateNotification() {
            // Check if notification already exists
            if (document.querySelector('.update-notification')) return;
            
            const updateDiv = document.createElement('div');
            updateDiv.className = 'update-notification';
            updateDiv.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: #FFD700; color: #000; padding: 16px 24px;
                border-radius: 12px; font-weight: 600; z-index: 9999;
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
                display: flex; align-items: center; gap: 16px;
                font-family: 'Cormorant Garamond', serif;
                max-width: 90%;
                animation: slideInUp 0.5s ease;
            `;
            updateDiv.innerHTML = `
                🔄 New version available!
                <button onclick="location.reload()" style="
                    background: #000; color: #fff; border: none;
                    padding: 8px 20px; border-radius: 8px; cursor: pointer;
                    font-weight: 600; font-size: 14px;
                    font-family: 'Cormorant Garamond', serif;
                ">Update Now</button>
                <button onclick="this.parentElement.remove()" style="
                    background: none; border: none; font-size: 20px;
                    cursor: pointer; color: #000;
                ">✕</button>
            `;
            document.body.appendChild(updateDiv);
            
            // Auto hide after 30 seconds
            setTimeout(() => {
                if (updateDiv.parentNode) {
                    updateDiv.style.opacity = '0';
                    updateDiv.style.transition = 'opacity 0.5s';
                    setTimeout(() => updateDiv.remove(), 500);
                }
            }, 30000);
        }
        
        // Add animation style for notification
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInUp {
                from { opacity: 0; transform: translateX(-50%) translateY(30px); }
                to { opacity: 1; transform: translateX(-50%) translateY(0); }
            }
        `;
        document.head.appendChild(style);
        
        console.log('✅ Tadaa! PWA ready to install!');
    </script>
</body>
</html>
