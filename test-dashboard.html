<!DOCTYPE html>
<html>
<head>
    <title>Test Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <h1>Firebase Test</h1>
    <div id="status">Checking...</div>
    <div id="data"></div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDCXnlAqyt2512HlvBOsSfMZ6O-xg0c94Y",
            authDomain: "tadaa-marketplace.firebaseapp.com",
            projectId: "tadaa-marketplace",
            storageBucket: "tadaa-marketplace.firebasestorage.app",
            messagingSenderId: "56983478470",
            appId: "1:56983478470:web:0efdf7f44b19e88a6237c7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        document.getElementById('status').textContent = '✅ Firebase loaded!';
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('status').textContent = '✅ Logged in as: ' + user.email;
                loadCategories();
            } else {
                document.getElementById('status').textContent = '❌ Not logged in. Redirecting...';
                setTimeout(() => {
                    window.location.href = '/tadaa-marketplace/admin.html';
                }, 2000);
            }
        });
        
        async function loadCategories() {
            try {
                const snap = await db.collection('categories').get();
                let html = '<h2>Categories:</h2><ul>';
                snap.forEach(doc => {
                    html += `<li>${doc.data().name}</li>`;
                });
                html += '</ul>';
                document.getElementById('data').innerHTML = html;
            } catch (error) {
                document.getElementById('data').innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
